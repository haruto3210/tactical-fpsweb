    .crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10}
    .crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(0,255,100,0.85);box-shadow:0 0 8px rgba(0,255,100,0.7), inset 0 0 4px rgba(0,255,100,0.3)}
    .crosshair::before{width:24px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%)}
    .crosshair::after{width:2px;height:24px;top:50%;left:50%;transform:translate(-50%,-50%)}

    .hud{position:absolute;bottom:20px;left:20px;color:#00ff64;font-family:'Courier New',monospace;text-shadow:0 0 15px rgba(0,255,100,0.6), 0 0 30px rgba(0,255,100,0.2);z-index:10;font-size:13px;line-height:1.6;background:rgba(0,20,0,0.4);padding:12px;border:1px solid rgba(0,255,100,0.3);border-radius:2px;backdrop-filter:blur(4px)}
    .muzzle-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;background:radial-gradient(circle at 30% 30%, rgba(255,220,100,0.95) 0%, rgba(255,180,50,0.7) 20%, rgba(255,100,0,0.3) 50%, transparent 75%);pointer-events:none;opacity:0;z-index:5;filter:drop-shadow(0 0 20px rgba(255,150,0,0.8))}

    .damage-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:0;background:radial-gradient(ellipse at center, transparent 30%, rgba(255,40,40,0.5) 60%, rgba(200,0,0,0.3) 100%)}
    .damage-overlay.active{animation:damage 0.4s ease-out}
    @keyframes damage{0%{opacity:1}100%{opacity:0}}
    .start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, #0a0a15 0%, #1a1a2e 50%, #050509 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
    .btn{padding:14px 45px;font-size:18px;background:linear-gradient(135deg,#00ff64 0%,#00dd55 50%,#00aa44 100%);border:2px solid #00ff64;border-radius:2px;cursor:pointer;font-weight:bold;color:#000;margin:10px;transition:all 0.2s;text-shadow:0 2px 4px rgba(0,0,0,0.3);box-shadow:0 0 20px rgba(0,255,100,0.4)}

    <p style="color:#aaa;font-family:monospace;margin-bottom:20px">敵を全滅させましょう。モードを選択してください</p><button class="btn" id="startNormal">▶ ノーマル</button> <button class="btn" id="startSpeedrun">▶ スピードラン</button> <button class="btn" id="startSurvival">▶ サバイバル</button> <button class="btn" id="startWave" style="background:linear-gradient(135deg,#ffaa00 0%,#ff8800 100%);border-color:#ffaa00">⚡ ウェーブ戦</button> <button class="btn" id="startPractice" style="background:linear-gradient(135deg,#00aaff 0%,#0088dd 100%);border-color:#00aaff">▶ 射撃練習</button> <button id="homeBtn" class="btn-home">🏠 ホームに戻る</button>

   <div class="pause-screen" id="pauseScreen">
    <h1 style="font-size:48px;color:#00d0ff;margin-bottom:10px">一時停止</h1>
    <p style="color:#ccc;font-family:monospace;font-size:20px;margin:10px 0">殺した人数: <span id="pauseKills">0</span>人</p><button class="btn btn-red" id="pauseResumeBtn">▶ ゲームに戻る</button> <button class="btn" id="pauseTitleBtn" style="margin-top:15px;background:#333;color:#fff">⬅ タイトルに戻る</button>

  <script>
// ==========================================
// ★ グローバル変数・基本設定
// ==========================================
let gameRunning = false;
let mode = "NORMAL";
let isPaused = false;
let isPointerLocked = false;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const keys = { w:false, a:false, s:false, d:false };
const mapSize = 30;

const player = {
  x:0, y:1.5, z:0,
  yaw:0, pitch:0,
  speed:0.18,
  radius:0.4
};

let health = 100;
let kills = 0;
let walls = [];
let enemies = [];
let projectiles = [];
let tracerLines = [];
let healItems = [];
let lastTime = performance.now();

// ★ 回復アイテム：15秒ごとに1個スポーン
let healSpawnTimer = 0;

// ★ モード別変数
let speedrunStart = 0;
let survivalStart = 0;
let survivalTime = 0;
let waveNumber = 1;
let waveEnemyCount = 0;
let waveSpawnTimer = 0;
let practiceScore = 0;

// ==========================================
// ★ 武器システム
// ==========================================
const weapons = [
  { name:"ライフル", damage:30, maxAmmo:30, reloadTime:1500, fireRate:120, tracer:true },
  { name:"ショットガン", damage:12, pellets:6, spread:0.06, maxAmmo:8, reloadTime:1800, fireRate:500, tracer:true },
  { name:"スナイパーライフル", damage:80, maxAmmo:5, reloadTime:2000, fireRate:800, tracer:true },
  { name:"小機関銃", damage:18, maxAmmo:40, reloadTime:1400, fireRate:70, tracer:true }
];

let currentWeaponIndex = 0;
let ammo = weapons[0].maxAmmo;
let lastShotTime = 0;
let isReloading = false;

// ==========================================
// ★ 敵タイプ定義（改良版）
// ==========================================
const ENEMY_TYPES = {
  NORMAL: { name:"ノーマル", health:50, speed:0.04, color:"#cc33aa", fireRate:2000, damage:5 },
  FAST: { name:"ファスト", health:70, speed:0.12, color:"#44ddff", fireRate:800, damage:6 },
  SHOOTER: { name:"シューター", health:100, speed:0.03, color:"#ffaa33", fireRate:800, damage:10 },
  HEAVY: { name:"ヘビー", health:200, speed:0.02, color:"#ff6666", fireRate:2000, damage:15 },
  BOSS: { name:"ボス", health:800, speed:0.04, color:"#ff8800", fireRate:300, damage:20 }
};

// ==========================================
// ★ UI / 画面管理
// ==========================================
function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (!isPaused) {
      openPauseMenu();
    } else {
      closePauseMenu();
    }
  }
});

function openPauseMenu() {
  document.getElementById("pauseScreen").style.display = "flex";
  isPaused = true;
}

function closePauseMenu() {
  document.getElementById("pauseScreen").style.display = "none";
  isPaused = false;
  canvas.requestPointerLock();
}
document.getElementById("homeBtn").onclick = () => {
    window.location.href = "../index.html";
};

document.getElementById("pauseResumeBtn").addEventListener("click", closePauseMenu);

document.getElementById("pauseTitleBtn").addEventListener("click", () => {
  closePauseMenu();
  document.getElementById("gameOverScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
  gameRunning = false;
  resetGameState();
  document.getElementById("bgm1").volume = 0.25;
  document.getElementById("bgm1").play();
});

document.getElementById("backToTitleBtn").addEventListener("click", () => {
  document.getElementById("gameOverScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
  gameRunning = false;
  resetGameState();
  document.getElementById("bgm1").volume = 0.25;
  document.getElementById("bgm1").play();
});

document.getElementById("restartBtn").addEventListener("click", () => {
  document.getElementById("gameOverScreen").style.display = "none";
  startGame(mode);
});

// ==========================================
// ★ ボタンリスナー
// ==========================================
document.getElementById("startNormal").addEventListener("click", () => startGame("NORMAL"));
document.getElementById("startSpeedrun").addEventListener("click", () => startGame("SPEEDRUN"));
document.getElementById("startSurvival").addEventListener("click", () => startGame("SURVIVAL"));
document.getElementById("startWave").addEventListener("click", () => startGame("WAVE"));
document.getElementById("startPractice").addEventListener("click", () => startGame("PRACTICE"));

// ==========================================
// ★ 3D投影
// ==========================================
function project3D(x, y, z) {
  const dx = x - player.x;
  const dy = y - player.y;
  const dz = z - player.z;

  const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
  const cp = Math.cos(player.pitch), sp = Math.sin(player.pitch);

  const rx = dx * cy - dz * sy;
  const rz = dx * sy + dz * cy;
  const ry = dy * cp - rz * sp;
  const rz2 = dy * sp + rz * cp;

  if (rz2 <= 0.1) return null;

  const fov = canvas.height;
  return {
    x: canvas.width/2 + (rx / rz2) * fov,
    y: canvas.height/2 - (ry / rz2) * fov,
    z: rz2
  };
}

// ==========================================
// ★ マップ生成
// ==========================================
function initMap(){
  walls.length = 0;

  for (let i=-mapSize;i<=mapSize;i+=2){
    walls.push({ x1:-mapSize, z1:i, x2:-mapSize, z2:i+2, color:"#2a4a3a", height:4 });
    walls.push({ x1:mapSize, z1:i, x2:mapSize, z2:i+2, color:"#2a4a3a", height:4 });
    walls.push({ x1:i, z1:-mapSize, x2:i+2, z2:-mapSize, color:"#3a4a2a", height:4 });
    walls.push({ x1:i, z1:mapSize, x2:i+2, z2:mapSize, color:"#3a4a2a", height:4 });
  }

  for (let i=0;i<10;i++){
    const x = (Math.random()*2-1)*(mapSize-8);
    const z = (Math.random()*2-1)*(mapSize-8);
    const w = 4 + Math.random()*6;
    const h = 4 + Math.random()*6;

    walls.push({ x1:x,   z1:z,   x2:x+w, z2:z,   color:"#4a3a2a", height:3 });
    walls.push({ x1:x+w, z1:z,   x2:x+w, z2:z+h, color:"#3a3a4a", height:3 });
    walls.push({ x1:x+w, z1:z+h, x2:x,   z2:z+h, color:"#4a3a2a", height:3 });
    walls.push({ x1:x,   z1:z+h, x2:x,   z2:z,   color:"#3a3a4a", height:3 });
  }
}

// ==========================================
// ★ 衝突判定
// ==========================================
function isColliding(x, z) {
  if (Math.abs(x) > mapSize-1 || Math.abs(z) > mapSize-1) return true;
  for (const w of walls){
    const minX = Math.min(w.x1,w.x2) - player.radius;
    const maxX = Math.max(w.x1,w.x2) + player.radius;
    const minZ = Math.min(w.z1,w.z2) - player.radius;
    const maxZ = Math.max(w.z1,w.z2) + player.radius;
    if (x>minX && x<maxX && z>minZ && z<maxZ) return true;
  }
  return false;
}

function isEnemyColliding(x, z) {
  const r = 0.75;
  if (Math.abs(x) > mapSize-1 || Math.abs(z) > mapSize-1) return true;
  for (const w of walls){
    const minX = Math.min(w.x1,w.x2) - r;
    const maxX = Math.max(w.x1,w.x2) + r;
    const minZ = Math.min(w.z1,w.z2) - r;
    const maxZ = Math.max(w.z1,w.z2) + r;
    if (x>minX && x<maxX && z>minZ && z<maxZ) return true;
  }
  return false;
}

// ==========================================
// ★ 敵スポーン
// ==========================================
function spawnEnemy(typeKey) {
  const type = ENEMY_TYPES[typeKey];
  const x = (Math.random() * 2 - 1) * (mapSize - 5);
  const z = (Math.random() * 2 - 1) * (mapSize - 5);

  enemies.push({
    x, z, y: 1.5,
    health: type.health,
    maxHealth: type.health,
    speed: type.speed,
    type: typeKey,
    color: type.color,
    lastShot: 0,
    walkPhase: Math.random() * Math.PI * 2,
    targetX: x,
    targetZ: z,
    targetTimer: 0,
    fireRateMod: type.fireRate,
    stateTimer: 0,
    state: "patrol" // patrol, chase, flee
  });
}

// ==========================================
// ★ 回復アイテム（立体化版）
// ==========================================
function spawnHealItem() {
  const x = (Math.random() * 2 - 1) * (mapSize - 4);
  const z = (Math.random() * 2 - 1) * (mapSize - 4);
  healItems.push({
    x, z, y: 0.5,
    size: 0.5,
    taken: false,
    rotation: 0
  });
}

function checkHealPickup() {
  for (const item of healItems) {
    if (item.taken) continue;
    const dx = player.x - item.x;
    const dz = player.z - item.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < 1.0) {
      item.taken = true;
      health = Math.min(100, health + 30);
      updateHUD();
      document.getElementById("sndHeal").play().catch(() => {});
    }
  }
}

function drawHealItem(item) {
  const p = project3D(item.x, item.y, item.z);
  if (!p || p.z <= 0) return null;

  const size = 30 / p.z;
  const t = performance.now() * 0.007;
  const bob = Math.sin(t) * 5;
  item.rotation += 0.05;

  return {
    z: p.z,
    draw: () => {
      ctx.save();
      ctx.translate(p.x, p.y + bob);
      ctx.rotate(item.rotation);

      // 外側の光輪
      const glowGrad = ctx.createRadialGradient(0, 0, size*0.2, 0, 0, size);
      glowGrad.addColorStop(0, `rgba(100,255,150,0.6)`);
      glowGrad.addColorStop(0.5, `rgba(50,255,100,0.3)`);
      glowGrad.addColorStop(1, `rgba(0,200,80,0)`);
      ctx.fillStyle = glowGrad;
      ctx.fillRect(-size, -size, size*2, size*2);

      // コア（立体的なキューブ）
      const faces = [
        { points: [[-4,-4],[4,-4],[4,4],[-4,4]], color: "rgba(100,255,150,0.9)" },
        { points: [[-3,-3],[3,-3],[3,3],[-3,3]], color: "rgba(150,255,180,0.7)" }
      ];
      
      faces.forEach(face => {
        ctx.fillStyle = face.color;
        ctx.beginPath();
        ctx.moveTo(face.points[0][0], face.points[0][1]);
        for (let i = 1; i < face.points.length; i++) {
          ctx.lineTo(face.points[i][0], face.points[i][1]);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = `rgba(255,255,200,0.5)`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      });

      // 十字マーク
      ctx.strokeStyle = `rgba(255,255,200,0.9)`;
      ctx.lineWidth = 1;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.lineTo(0, 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-6, 0);
      ctx.lineTo(6, 0);
      ctx.stroke();

      ctx.restore();
    }
  };
}

// ==========================================
// ★ 敵の描画
// ==========================================
function drawEnemy(enemy) {
  const p = project3D(enemy.x, enemy.y, enemy.z);
  if (!p || p.z <= 0) return null;

  const size = 250 / p.z;
  const bob = Math.sin(enemy.walkPhase) * (size*0.1);
  const hpRatio = Math.max(0, enemy.health / enemy.maxHealth);
  const lightLevel = Math.max(0.4, 1 - p.z / 50);

  return {
    z: p.z,
    draw: () => {
      ctx.save();

      // 身体
      const bodyGrad = ctx.createLinearGradient(p.x - size/2, p.y - size, p.x + size/2, p.y);
      bodyGrad.addColorStop(0, enemy.color);
      bodyGrad.addColorStop(1, `rgba(0,0,0,${0.5 * lightLevel})`);
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(p.x-size/2, p.y-size + bob, size, size*1.5);

      ctx.strokeStyle = `rgba(0,0,0,${0.5 * lightLevel})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(p.x-size/2, p.y-size + bob, size, size*1.5);

      // 頭部（立体的な球体）
      const headSize = size*0.45;
      const headGrad = ctx.createRadialGradient(p.x - headSize*0.2, p.y-size*1.15 + bob - headSize*0.2, headSize*0.2, p.x, p.y-size*1.2 + bob, headSize);
      headGrad.addColorStop(0, `rgba(220,170,120,${0.9 * lightLevel})`);
      headGrad.addColorStop(0.6, `rgba(200,150,100,${0.85 * lightLevel})`);
      headGrad.addColorStop(1, `rgba(140,90,60,${0.7 * lightLevel})`);
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.arc(p.x, p.y-size*1.2 + bob, headSize, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = `rgba(0,0,0,${0.4 * lightLevel})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 目
      const eyeY = p.y-size*1.25 + bob;
      ctx.fillStyle = `rgba(50,20,20,${lightLevel})`;
      ctx.beginPath();
      ctx.arc(p.x-size*0.15, eyeY, size*0.12, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x+size*0.15, eyeY, size*0.12, 0, Math.PI*2);
      ctx.fill();

      // 瞳（状態に応じて色変化）
      const pupilColor = enemy.state === "chase" ? "#ff3333" : enemy.state === "flee" ? "#ffff00" : "#ff9933";
      ctx.fillStyle = pupilColor;
      const pupilOffset = Math.sin(enemy.walkPhase) * size * 0.03;
      ctx.beginPath();
      ctx.arc(p.x-size*0.15 + pupilOffset, eyeY, size*0.06, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x+size*0.15 + pupilOffset, eyeY, size*0.06, 0, Math.PI*2);
      ctx.fill();

      // HPバー
      const hpWidth = size * 1.2;
      const hpHeight = size*0.18;
      const hpY = p.y-size*1.8 + bob;

      ctx.fillStyle = `rgba(0,0,0,${0.6 * lightLevel})`;
      ctx.fillRect(p.x-hpWidth/2, hpY, hpWidth, hpHeight);
      ctx.strokeStyle = `rgba(100,100,100,${0.5 * lightLevel})`;
      ctx.lineWidth = 1;
      ctx.strokeRect(p.x-hpWidth/2, hpY, hpWidth, hpHeight);

      const hpColor = hpRatio>0.5 ? "#00ff00" : hpRatio>0.25 ? "#ffff00" : "#ff0000";
      const hpGrad = ctx.createLinearGradient(p.x-hpWidth/2, hpY, p.x-hpWidth/2, hpY+hpHeight);
      hpGrad.addColorStop(0, `${hpColor}99`);
      hpGrad.addColorStop(1, hpColor);
      ctx.fillStyle = hpGrad;
      ctx.fillRect(p.x-hpWidth/2, hpY, hpWidth*hpRatio, hpHeight);

      ctx.restore();
    }
  };
}

// ==========================================
// ★ 射撃
// ==========================================
function shoot() {
  if (!gameRunning || isReloading) return;
  const now = performance.now();
  const weapon = weapons[currentWeaponIndex];
  if (now - lastShotTime < weapon.fireRate) return;
  if (ammo <= 0) { reload(); return; }

  lastShotTime = now;
  ammo--;
  updateHUD();

  const flash = document.querySelector(".muzzle-flash");
  flash.classList.remove("active");
  void flash.offsetWidth;
  flash.classList.add("active");
  playShootSound();

  const yaw = player.yaw;
  const pitch = player.pitch;
  const dirX = Math.sin(yaw)*Math.cos(pitch);
  const dirY = Math.sin(pitch);
  const dirZ = Math.cos(yaw)*Math.cos(pitch);

  if (currentWeaponIndex === 1) {
    for (let i=0;i<weapon.pellets;i++){
      const spreadYaw = (Math.random()-0.5)*weapon.spread;
      const spreadPitch = (Math.random()-0.5)*weapon.spread;
      const sy = yaw + spreadYaw;
      const sp = pitch + spreadPitch;
      const vx = Math.sin(sy)*Math.cos(sp);
      const vy = Math.sin(sp);
      const vz = Math.cos(sy)*Math.cos(sp);
      projectiles.push({
        x:player.x,y:player.y,z:player.z,
        vx:vx*1.2,vy:vy*1.2,vz:vz*1.2,
        life:2.5,owner:"player",damage:weapon.damage
      });
    }
  } else {
    const speed = currentWeaponIndex === 2 ? 2.5 : 1.6;
    projectiles.push({
      x:player.x,y:player.y,z:player.z,
      vx:dirX*speed,vy:dirY*speed,vz:dirZ*speed,
      life:3.0,owner:"player",damage:weapon.damage
    });
  }

  tracerLines.push({
    x1:canvas.width/2,y1:canvas.height/2,
    x2:canvas.width/2 + dirX*200,y2:canvas.height/2 - dirY*200,
    life:0.4
  });

  if (ammo <= 0) reload();
}

function reload() {
  if (isReloading) return;
  const weapon = weapons[currentWeaponIndex];
  if (ammo === weapon.maxAmmo) return;
  isReloading = true;
  document.getElementById("ammo").textContent = "...";
  setTimeout(() => {
    ammo = weapon.maxAmmo;
    isReloading = false;
    updateHUD();
  }, weapon.reloadTime);
}
function playShootSound() {
    const s = document.getElementById("sndShoot").cloneNode();
    s.play();
}

// ==========================================
// ★ プロジェクタイル更新
// ==========================================
function updateProjectiles(dt) {
  const removeIdx = [];

  for (let i = 0; i < projectiles.length; i++) {
    const p = projectiles[i];

    // ★ 次の位置を計算
    const nextX = p.x + p.vx * dt * 60;
    const nextY = p.y + p.vy * dt * 60;
    const nextZ = p.z + p.vz * dt * 60;

    // ★ 壁衝突（XZ だけ見る）
    if (isColliding(nextX, nextZ)) {
      p.life = 0;          // 壁に当たったら寿命ゼロ
      // ここでは continue しない。下の「life<=0」で確実に消す
    } else {
      // 壁に当たってないときだけ移動
      p.x = nextX;
      p.y = nextY;
      p.z = nextZ;
    }

    p.life -= dt;

    // ★ ここから先は「生きてる弾だけ」処理する
    if (p.life > 0) {
      if (p.owner === "player") {
        // プレイヤー弾 → 敵にヒット
        for (let j = 0; j < enemies.length; j++) {
          const enemy = enemies[j];
          const dist = Math.hypot(p.x - enemy.x, p.z - enemy.z);
          if (dist < 0.9) {
            enemy.health -= p.damage;
            p.life = 0;
            document.getElementById("sndHit").play().catch(() => {});
            if (enemy.health <= 0) {
              enemies.splice(j, 1);
              j--;
              kills++;
              updateHUD();
            }
            break;
          }
        }
      } else {
        // 敵弾 → プレイヤーにヒット
        const dxp = p.x - player.x;
        const dzp = p.z - player.z;
        if (Math.hypot(dxp, dzp) < 1.0) {
          health -= p.damage;
          p.life = 0;
          updateHUD();
          const damageOverlay = document.querySelector(".damage-overlay");
          damageOverlay.classList.remove("active");
          void damageOverlay.offsetWidth;
          damageOverlay.classList.add("active");
          document.getElementById("sndHurt").play().catch(() => {});
          if (health <= 0) endGame();
        }
      }
    }

    if (p.life <= 0) {
      removeIdx.push(i);
    }
  }

  for (let i = removeIdx.length - 1; i >= 0; i--) {
    projectiles.splice(removeIdx[i], 1);
  }
}
// ==========================================
// ★ 敵AI（改良版：より知能的に）
// ==========================================
function updateEnemies(dt) {
  const now = performance.now();
  enemies.forEach(enemy => {
    const dx = player.x - enemy.x;
    const dz = player.z - enemy.z;
    const dist = Math.hypot(dx, dz);
    const type = ENEMY_TYPES[enemy.type];

    // ★ 状態管理
    enemy.stateTimer -= dt;
    if (enemy.stateTimer <= 0) {
      if (dist < 15) {
        enemy.state = "chase";
        enemy.stateTimer = 2;
      } else if (dist < 5 && health < 50) {
        enemy.state = "flee";
        enemy.stateTimer = 3;
      } else {
        enemy.state = "patrol";
        enemy.stateTimer = 3;
      }
    }

    // ★ 行動実行
    if (enemy.state === "patrol") {
      enemy.targetTimer -= dt;
      if (enemy.targetTimer <= 0) {
        enemy.targetX = (Math.random()*2-1)*(mapSize-5);
        enemy.targetZ = (Math.random()*2-1)*(mapSize-5);
        enemy.targetTimer = 5;
      }
      const tdx = enemy.targetX - enemy.x;
      const tdz = enemy.targetZ - enemy.z;
      const tdist = Math.hypot(tdx, tdz);
      if (tdist > 0.5) {
        const mx = (tdx/tdist) * enemy.speed * dt * 60;
        const mz = (tdz/tdist) * enemy.speed * dt * 60;
        if (!isEnemyColliding(enemy.x + mx, enemy.z)) enemy.x += mx;
        if (!isEnemyColliding(enemy.x, enemy.z + mz)) enemy.z += mz;
      }
    } else if (enemy.state === "chase") {
      if (dist > 0.5) {
        const mx = (dx/dist) * enemy.speed * dt * 60;
        const mz = (dz/dist) * enemy.speed * dt * 60;
        if (!isEnemyColliding(enemy.x + mx, enemy.z)) enemy.x += mx;
        if (!isEnemyColliding(enemy.x, enemy.z + mz)) enemy.z += mz;
      }
    } else if (enemy.state === "flee") {
      if (dist < 20) {
        const mx = (-dx/dist) * enemy.speed * 1.5 * dt * 60;
        const mz = (-dz/dist) * enemy.speed * 1.5 * dt * 60;
        if (!isEnemyColliding(enemy.x + mx, enemy.z)) enemy.x += mx;
        if (!isEnemyColliding(enemy.x, enemy.z + mz)) enemy.z += mz;
      }
    }

    enemy.walkPhase += enemy.speed * 10 * dt * 60;

    // ★ 接近ダメージ
    if (dist < 0.9) {
      health -= 10 * dt;
      updateHUD();
      const damageOverlay = document.querySelector(".damage-overlay");
      damageOverlay.classList.remove("active");
      void damageOverlay.offsetWidth;
      damageOverlay.classList.add("active");
      document.getElementById("sndHurt").play().catch(() => {});
      if (health <= 0) endGame();
    }

    // ★ 遠距離射撃
    if (dist < 30 && now - enemy.lastShot > enemy.fireRateMod) {
      enemy.lastShot = now;
      const dy = player.y - enemy.y;
      const dlen = Math.hypot(dx, dz, dy) || 1;
      const vx = (dx/dlen)*1.2;
      const vy = (dy/dlen)*1.2;
      const vz = (dz/dlen)*1.2;
      projectiles.push({
        x:enemy.x,y:enemy.y,z:enemy.z,
        vx,vy,vz,life:3.0,
        owner:enemy,damage:type.damage
      });
      playShootSound();
    }
  });
}

// ==========================================
// ★ 描画関数
// ==========================================
function drawFloorAndSky() {
  const skyGrad = ctx.createLinearGradient(0,0,0,canvas.height/2);
  skyGrad.addColorStop(0,"#0a0a15");
  skyGrad.addColorStop(0.5,"#151530");
  skyGrad.addColorStop(1,"#1a1a35");
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,canvas.width,canvas.height/2);

  const floorGrad = ctx.createLinearGradient(0,canvas.height/2,0,canvas.height);
  floorGrad.addColorStop(0,"#1a1a1a");
  floorGrad.addColorStop(1,"#000000");
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);
}

function drawWall(wall) {
  const h = wall.height || 3;
  const pts = [
    project3D(wall.x1,0,wall.z1),
    project3D(wall.x2,0,wall.z2),
    project3D(wall.x2,h,wall.z2),
    project3D(wall.x1,h,wall.z1)
  ];
  if (pts.some(p=>!p || p.z<=0)) return null;

  const avgZ = (pts[0].z+pts[1].z+pts[2].z+pts[3].z)/4;
  const distance = Math.max(0.3, 1 - avgZ / 45);

  return {
    z:avgZ,
    draw:()=>{
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      ctx.lineTo(pts[1].x,pts[1].y);
      ctx.lineTo(pts[2].x,pts[2].y);
      ctx.lineTo(pts[3].x,pts[3].y);
      ctx.closePath();

      ctx.fillStyle = wall.color;
      ctx.globalAlpha = distance;
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.strokeStyle = `rgba(0,0,0,${0.6 * distance})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  };
}

function drawProjectiles() {
  for (const p of projectiles){
    const pr = project3D(p.x,p.y,p.z);
    if (!pr) continue;
    const r = Math.max(2.5, 8/pr.z);

    if (p.owner === "player") {
      const bulletGrad = ctx.createRadialGradient(pr.x - r*0.3, pr.y - r*0.3, 0, pr.x, pr.y, r);
      bulletGrad.addColorStop(0, "rgba(255,255,200,1)");
      bulletGrad.addColorStop(1, "rgba(200,200,50,0.4)");
      ctx.fillStyle = bulletGrad;
      ctx.beginPath();
      ctx.arc(pr.x, pr.y, r, 0, Math.PI*2);
      ctx.fill();
    } else {
      const bulletGrad = ctx.createRadialGradient(pr.x - r*0.3, pr.y - r*0.3, 0, pr.x, pr.y, r);
      bulletGrad.addColorStop(0, "rgba(255,150,150,1)");
      bulletGrad.addColorStop(1, "rgba(200,50,50,0.4)");
      ctx.fillStyle = bulletGrad;
      ctx.beginPath();
      ctx.arc(pr.x, pr.y, r, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawMinimap() {
  const size = 150;
  ctx.save();
  ctx.translate(canvas.width-size-20,20);
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0,0,size,size);

  ctx.fillStyle = "#666";
  walls.forEach(w=>{
    const cx = (w.x1+w.x2)/2;
    const cz = (w.z1+w.z2)/2;
    ctx.fillRect((cx+mapSize)/(mapSize*2)*size-2,(cz+mapSize)/(mapSize*2)*size-2,4,4);
  });

  ctx.fillStyle = "#f44";
  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc((e.x+mapSize)/(mapSize*2)*size,(e.z+mapSize)/(mapSize*2)*size,3,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle = "#0f0";
  healItems.forEach(item => {
    if (!item.taken) {
      ctx.beginPath();
      ctx.arc((item.x+mapSize)/(mapSize*2)*size,(item.z+mapSize)/(mapSize*2)*size,2,0,Math.PI*2);
      ctx.fill();
    }
  });

  ctx.fillStyle = "#0f0";
  ctx.beginPath();
  ctx.arc((player.x+mapSize)/(mapSize*2)*size,(player.z+mapSize)/(mapSize*2)*size,4,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ==========================================
// ★ プレイヤー更新
// ==========================================
function updatePlayer(dt) {
  let dx=0,dz=0;
  if (keys.w){ dx += Math.sin(player.yaw); dz += Math.cos(player.yaw); }
  if (keys.s){ dx -= Math.sin(player.yaw); dz -= Math.cos(player.yaw); }
  if (keys.a){ dx -= Math.cos(player.yaw); dz += Math.sin(player.yaw); }
  if (keys.d){ dx += Math.cos(player.yaw); dz -= Math.sin(player.yaw); }
  if (dx!==0 || dz!==0){
    const len = Math.hypot(dx,dz);
    dx = dx/len * player.speed * dt * 60;
    dz = dz/len * player.speed * dt * 60;
    const newX = player.x + dx;
    const newZ = player.z + dz;
    if (!isColliding(newX,player.z)) player.x = newX;
    if (!isColliding(player.x,newZ)) player.z = newZ;
  }
}

// ==========================================
// ★ HUD更新
// ==========================================
function updateHUD() {
  document.getElementById("health").textContent = Math.floor(health);
  document.getElementById("weaponName").textContent = weapons[currentWeaponIndex].name;
  document.getElementById("ammo").textContent = ammo;
  document.getElementById("maxAmmo").textContent = weapons[currentWeaponIndex].maxAmmo;
  document.getElementById("kills").textContent = kills;
  document.getElementById("modeName").textContent = mode;
  document.getElementById("healItemsCount").textContent = healItems.filter(i => !i.taken).length;
}

// ==========================================
// ★ ゲーム開始 / 終了
// ==========================================
function startGame(selectedMode) {
  mode = selectedMode;
  health = 100;
  kills = 0;
  currentWeaponIndex = 0;
  ammo = weapons[0].maxAmmo;
  isReloading = false;
  lastShotTime = 0;
  tracerLines = [];
  projectiles = [];
  enemies = [];
  healItems = [];
  healSpawnTimer = 0;
  waveNumber = 1;
  waveEnemyCount = 0;
  waveSpawnTimer = 0;
  practiceScore = 0;

  player.x = 0;
  player.z = 0;
  player.yaw = 0;
  player.pitch = 0;

  initMap();
  updateHUD();

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameOverScreen").style.display = "none";

  gameRunning = true;

  // BGM
  const bgm1 = document.getElementById("bgm1");
  const bgm2 = document.getElementById("bgm2");
  const bgm3 = document.getElementById("bgm3");
  bgm1.pause(); bgm1.currentTime = 0;
  bgm2.pause(); bgm2.currentTime = 0;
  bgm3.pause(); bgm3.currentTime = 0;

  if (Math.random() < 0.5) {
    bgm2.volume = 0.25;
    bgm2.play().catch(() => {});
  } else {
    bgm3.volume = 0.25;
    bgm3.play().catch(() => {});
  }

  // モード別初期化
  if (mode === "NORMAL") {
    for (let i = 0; i < 8; i++) spawnEnemy("NORMAL");
  } else if (mode === "SPEEDRUN") {
    speedrunStart = performance.now();
    for (let i = 0; i < 10; i++) spawnEnemy("FAST");
  } else if (mode === "SURVIVAL") {
    survivalStart = performance.now();
    for (let i = 0; i < 5; i++) spawnEnemy("NORMAL");
  } else if (mode === "WAVE") {
    waveNumber = 1;
    waveEnemyCount = 3;
    for (let i = 0; i < waveEnemyCount; i++) spawnEnemy("NORMAL");
  } else if (mode === "PRACTICE") {
    practiceScore = 0;
    for (let i = 0; i < 3; i++) spawnEnemy("NORMAL");
  }

  document.getElementById("timerBox").style.display = mode === "SPEEDRUN" ? "block" : "none";
  document.getElementById("surviveBox").style.display = mode === "SURVIVAL" ? "block" : "none";
  document.getElementById("waveBox").style.display = mode === "WAVE" ? "block" : "none";
  document.getElementById("bossHpBox").style.display = "none";

  canvas.requestPointerLock?.();
}

function endGame() {
  gameRunning = false;
  document.exitPointerLock?.();
  document.getElementById("finalKills").textContent = kills;
  document.getElementById("gameOverScreen").style.display = "flex";
}

function resetGameState() {
  player.x = 0;
  player.z = 0;
  player.yaw = 0;
  player.pitch = 0;
  enemies = [];
  projectiles = [];
  tracerLines = [];
  healItems = [];
  health = 100;
  kills = 0;
}

// ==========================================
// ★ ゲームループ
// ==========================================
function gameLoop(now) {
  const dt = Math.min((now - lastTime)/1000, 0.016);
  lastTime = now;

  if (gameRunning && !isPaused) {
    updatePlayer(dt);
    updateEnemies(dt);
    updateProjectiles(dt);
    checkHealPickup();

    // ★ 回復アイテム：15秒ごとに1個スポーン
    healSpawnTimer += dt;
    if (healSpawnTimer > 15) {
      healSpawnTimer = 0;
      spawnHealItem();
    }

    // ★ モード別ロジック
    if (mode === "SPEEDRUN") {
      const elapsed = (now - speedrunStart) / 1000;
      document.getElementById("timer").textContent = elapsed.toFixed(2);
      if (enemies.length === 0 && kills >= 10) {
        endGame();
      }
    } else if (mode === "SURVIVAL") {
      const elapsed = (now - survivalStart) / 1000;
      document.getElementById("surviveTime").textContent = elapsed.toFixed(2);
      if (enemies.length < 3) {
        spawnEnemy(Math.random() < 0.3 ? "SHOOTER" : "FAST");
      }
    } else if (mode === "WAVE") {
      waveSpawnTimer += dt;
      if (enemies.length === 0 && waveSpawnTimer > 2) {
        waveNumber++;
        waveEnemyCount = 3 + waveNumber * 2;
        waveSpawnTimer = 0;
        for (let i = 0; i < waveEnemyCount; i++) {
          spawnEnemy(Math.random() < 0.4 ? "FAST" : Math.random() < 0.5 ? "HEAVY" : "SHOOTER");
        }
        if (waveNumber % 5 === 0) spawnEnemy("BOSS");
        document.getElementById("waveNumber").textContent = waveNumber;
      }
    } else if (mode === "PRACTICE") {
      if (enemies.length < 2) {
        spawnEnemy("NORMAL");
      }
      document.getElementById("kills").textContent = `スコア: ${kills * 100}`;
    } else if (mode === "NORMAL") {
      if (enemies.length === 0) {
        endGame();
      }
    }
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawFloorAndSky();

  const drawables = [];

  walls.forEach(w=>{
    const d = drawWall(w);
    if (d) drawables.push(d);
  });

  enemies.forEach(e=>{
    const d = drawEnemy(e);
    if (d) drawables.push(d);
  });

  healItems.forEach(item=>{
    if (!item.taken){
      const d = drawHealItem(item);
      if (d) drawables.push(d);
    }
  });

  drawables.sort((a,b)=>b.z - a.z);
  drawables.forEach(d=>d.draw());

  drawProjectiles();
  drawMinimap();

  requestAnimationFrame(gameLoop);
}

// ==========================================
// ★ イベント登録
// ==========================================
document.addEventListener("keydown", e => {
  const key = e.key.toLowerCase();
  if (key in keys) keys[key] = true;
  if (key === "r") reload();
  if (key === "1") { currentWeaponIndex = 0; ammo = Math.min(ammo, weapons[0].maxAmmo); updateHUD(); }
  if (key === "2") { currentWeaponIndex = 1; ammo = Math.min(ammo, weapons[1].maxAmmo); updateHUD(); }
  if (key === "3") { currentWeaponIndex = 2; ammo = Math.min(ammo, weapons[2].maxAmmo); updateHUD(); }
  if (key === "4") { currentWeaponIndex = 3; ammo = Math.min(ammo, weapons[3].maxAmmo); updateHUD(); }
});

document.addEventListener("keyup", e => {
  const key = e.key.toLowerCase();
  if (key in keys) keys[key] = false;
});

document.addEventListener("mousemove", e => {
  if (!gameRunning || !isPointerLocked || isPaused) return;
  player.yaw += e.movementX * 0.003;
  player.pitch -= e.movementY * 0.003;
  const limit = Math.PI/2.5;
  if (player.pitch > limit) player.pitch = limit;
  if (player.pitch < -limit) player.pitch = -limit;
});

document.addEventListener("pointerlockchange", () => {
  isPointerLocked = document.pointerLockElement === canvas;
});

canvas.addEventListener("click", () => {
  if (!isPointerLocked) {
    canvas.requestPointerLock();
    return;
  }
  if (gameRunning && !isPaused) shoot();
});

document.getElementById("restartBtn").addEventListener("click", () => {
  startGame(mode);
});

window.addEventListener("resize", resize);

window.addEventListener("load", () => {
  resize();
  initMap();
  updateHUD();
  requestAnimationFrame(gameLoop);
