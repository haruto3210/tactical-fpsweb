<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>TACTICAL FPS PC</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#0f0;font-family:system-ui, -apple-system, "Segoe UI", sans-serif}
    #game-container{position:relative;width:100%;height:100%;overflow:hidden}
    canvas{display:block;width:100%;height:100%;image-rendering:crisp-edges}
    .btn-home {background: linear-gradient(135deg, #00ff64 0%, #00cc50 100%);border: 2px solid #00ff64;color: #000;padding: 12px 20px;font-size: 18px;border-radius: 8px;cursor: pointer;width: 90%;max-width: 300px;margin: 10px auto;display: block;text-align: center;font-weight: bold;}
    .btn-home:active { transform: scale(0.96); }
    .crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10}
    .crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(0,255,100,0.85);box-shadow:0 0 8px rgba(0,255,100,0.7), inset 0 0 4px rgba(0,255,100,0.3)}
    .crosshair::before{width:24px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%)}
    .crosshair::after{width:2px;height:24px;top:50%;left:50%;transform:translate(-50%,-50%)}
    .crosshair .dot{position:absolute;width:3px;height:3px;background:rgba(0,255,100,1);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 4px rgba(0,255,100,0.8)}
    .hud{position:absolute;bottom:20px;left:20px;color:#00ff64;font-family:'Courier New',monospace;text-shadow:0 0 15px rgba(0,255,100,0.6), 0 0 30px rgba(0,255,100,0.2);z-index:10;font-size:13px;line-height:1.6;background:rgba(0,20,0,0.4);padding:12px;border:1px solid rgba(0,255,100,0.3);border-radius:2px;backdrop-filter:blur(4px)}
    .muzzle-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;background:radial-gradient(circle at 30% 30%, rgba(255,220,100,0.95) 0%, rgba(255,180,50,0.7) 20%, rgba(255,100,0,0.3) 50%, transparent 75%);pointer-events:none;opacity:0;z-index:5;filter:drop-shadow(0 0 20px rgba(255,150,0,0.8))}
    .muzzle-flash.active{animation:flash 0.12s cubic-bezier(0.34, 1.56, 0.64, 1)}
    @keyframes flash{0%{opacity:1;transform:translate(-50%,-50%) scale(0.3)}50%{opacity:0.8}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}
    .damage-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:0;background:radial-gradient(ellipse at center, transparent 30%, rgba(255,40,40,0.5) 60%, rgba(200,0,0,0.3) 100%)}
    .damage-overlay.active{animation:damage 0.4s ease-out}
    @keyframes damage{0%{opacity:1}100%{opacity:0}}
    .start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, #0a0a15 0%, #1a1a2e 50%, #050509 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
    .btn{padding:14px 45px;font-size:18px;background:linear-gradient(135deg,#00ff64 0%,#00dd55 50%,#00aa44 100%);border:2px solid #00ff64;border-radius:2px;cursor:pointer;font-weight:bold;color:#000;margin:10px;transition:all 0.2s;text-shadow:0 2px 4px rgba(0,0,0,0.3);box-shadow:0 0 20px rgba(0,255,100,0.4)}
    .btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(0,255,100,0.7)}
    .game-over-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px)}
    .btn-red{background:linear-gradient(135deg,#ff4444 0%,#cc0000 100%);color:#fff;border:2px solid #ff4444}
    .btn-red:hover{box-shadow:0 0 30px rgba(255,0,0,0.6)}
    .pause-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;pointer-events:auto}
    .modal-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:10000}
    .modal{background:#111;border:2px solid #00ff64;padding:18px;border-radius:8px;color:#fff;min-width:320px;max-width:90%}
    .modal h3{margin:0 0 8px 0;color:#0f0}
    .modal .row{margin-top:8px;display:flex;gap:8px;justify-content:flex-end}
    .slot-selected{outline:3px solid rgba(0,255,100,0.9)}
    .slot-small{padding:8px 12px;font-size:14px}
    #loadFileInput, #loadFileBtn, #saveFileBtn { display: none !important; }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="crosshair"><div class="dot"></div></div>
    <div class="muzzle-flash"></div>
    <div class="damage-overlay"></div>

    <div class="hud">
      <div>TACTICAL FPS-WEB PC</div>
      <div>プレイヤー: <span id="playerNameLabel">PLAYER</span></div>
      <div>モード: <span id="modeName">NORMAL</span></div>
      <div>体力: <span id="health">100</span></div>
      <div>武器: <span id="weaponName">Rifle</span></div>
      <div>残弾数: <span id="ammo">30</span> / <span id="maxAmmo">30</span></div>
      <div>殺した人数: <span id="kills">0</span></div>
      <div style="color:#00ff00">回復アイテム: <span id="healItemsCount">0</span></div>
      <div id="timerBox" style="display:none">タイム: <span id="timer">0.00</span>s</div>
      <div id="surviveBox" style="display:none">生き残った時間: <span id="surviveTime">0.00</span>s</div>
      <div id="waveBox" style="display:none">ウェーブ: <span id="waveNumber">1</span></div>
      <div id="bossHpBox" style="display:none;color:#ff6600">ボス体力: <span id="bossHp">0</span></div>
    </div>

    <!-- Audio elements (missing files are handled with .catch) -->
    <audio id="sndHit" src="hit.mp3"></audio>
    <audio id="sndHurt" src="hurt.mp3"></audio>
    <audio id="sndExplosion" src="explosion.mp3"></audio>
    <audio id="sndMissile" src="missile.mp3"></audio>
    <audio id="sndHeal" src="heal.mp3"></audio>
    <audio id="bgm1" src="bgm1.mp3" loop></audio>
    <audio id="bgm2" src="bgm2.mp3" loop></audio>
    <audio id="bgm3" src="bgm3.mp3" loop></audio>
    <audio id="sndShootPlayer" src="player_shoot.mp3"></audio>
    <audio id="sndShootEnemy" src="enemy_shoot.mp3"></audio>

    <div class="start-screen" id="startScreen">
      <h1 style="font-size:48px;color:#00ff64;margin-bottom:10px">TACTICAL FPS</h1>
      <div style="margin-bottom:16px;color:#ddd;font-family:monospace;">
        名前：
        <input id="playerNameInput" type="text" maxlength="16" placeholder="PLAYER" style="padding:6px 8px;border-radius:4px;border:1px solid #555;background:#111;color:#0f0;"/>
      </div>
      <p style="color:#aaa;font-family:monospace;margin-bottom:20px">敵を全滅させましょう。モードを選択してください</p>

      <!-- Save slot UI -->
      <div id="saveSlotsContainer" style="display:flex;gap:8px;margin-top:12px;">
        <button id="slotBtn1" class="btn slot-small" data-slot="1">Slot 1: 空</button>
        <button id="slotBtn2" class="btn slot-small" data-slot="2">Slot 2: 空</button>
        <button id="slotBtn3" class="btn slot-small" data-slot="3">Slot 3: 空</button>
      </div>

      <button class="btn" id="startNormal">▶ ノーマル</button>
      <button class="btn" id="startSpeedrun">▶ スピードラン</button>
      <button class="btn" id="startSurvival">▶ サバイバル</button>
      <button class="btn" id="startWave" style="background:linear-gradient(135deg,#ffaa00 0%,#ff8800 100%);border-color:#ffaa00">⚡ ウェーブ戦</button>
      <button class="btn" id="startPractice" style="background:linear-gradient(135deg,#00aaff 0%,#0088dd 100%);border-color:#00aaff">▶ 射撃練習</button>

      <button id="homeBtn" class="btn-home">🏠 ホームに戻る</button>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
      <p style="color:#ccc;font-family:monospace;font-size:22px;margin:10px 0">殺した人数: <span id="finalKills">0</span>人</p>
      <p id="finalModeInfo" style="color:#0f0;font-family:monospace;font-size:20px;margin-top:10px"></p>
      <button class="btn btn-red" id="restartBtn">↻ もう一度</button>
      <button class="btn" id="backToTitleBtn" style="margin-top:15px;background:#444;color:#fff">⬅ タイトルに戻る</button>
    </div>

    <div class="pause-screen" id="pauseScreen">
      <h1 style="font-size:48px;color:#00d0ff;margin-bottom:10px">一時停止</h1>
      <p style="color:#ccc;font-family:monospace;font-size:20px;margin:10px 0">殺した人数: <span id="pauseKills">0</span>人</p>
      <button class="btn btn-red" id="pauseResumeBtn">▶ ゲームに戻る</button>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
        <button class="btn" id="pauseSaveBtn" style="background:linear-gradient(135deg,#00ff64 0%,#00dd55 100%);border-color:#00ff64;color:#000;">💾 セーブ</button>
        <button class="btn" id="pauseLoadBtn" style="background:#444;border-color:#777;color:#fff;">▶ ロード</button>
      </div>

      <div style="margin-top:12px;color:#ddd;font-family:monospace;">
        <label style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="autosaveToggle">
          <span>自動セーブを有効にする（選択スロットに一時停止時に保存）</span>
        </label>
      </div>

      <button class="btn" id="pauseTitleBtn" style="margin-top:15px;background:#333;color:#fff">⬅ タイトルに戻る</button>
    </div>
  </div>

  <!-- Overwrite modal -->
  <div id="overwriteModal" class="modal-backdrop">
    <div class="modal">
      <h3>上書き確認</h3>
      <div id="overwriteMessage">このスロットは既にデータがあります。上書きしますか？</div>
      <div class="row">
        <button id="overwriteCancel" class="btn">キャンセル</button>
        <button id="overwriteConfirm" class="btn btn-red">上書きする</button>
      </div>
    </div>
  </div>

  <!-- Slot name modal -->
  <div id="slotNameModal" class="modal-backdrop">
    <div class="modal">
      <h3>スロット名を編集</h3>
      <div style="margin-top:8px;">
        <input id="slotNameInput" type="text" maxlength="32" style="width:100%;padding:8px;border-radius:4px;border:1px solid #444;background:#000;color:#0f0">
      </div>
      <div class="row">
        <button id="slotNameCancel" class="btn">キャンセル</button>
        <button id="slotNameSave" class="btn">保存</button>
      </div>
    </div>
  </div>

  <script>
  // -------------------------
  // Robust single-file game
  // No runtime ReferenceError / SyntaxError expected
  // Defensive checks and safe start
  // -------------------------

  // Utilities and state
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const keys = { w:false, a:false, s:false, d:false };
  const mapSize = 30;

  const player = { x:0, y:1.5, z:0, yaw:0, pitch:0, speed:0.18, radius:0.4 };

  let health = 100;
  let kills = 0;
  let walls = [];
  let enemies = [];
  let projectiles = [];
  let tracerLines = [];
  let healItems = [];
  let lastTime = performance.now();

  let healSpawnTimer = 0;
  let speedrunStart = 0;
  let survivalStart = 0;
  let survivalTime = 0;
  let waveNumber = 1;
  let waveEnemyCount = 0;
  let waveSpawnTimer = 0;
  let practiceScore = 0;
  let playerName = localStorage.getItem("tacops_playerName") || "PLAYER";

  const weapons = [
    { name:"ライフル", damage:30, maxAmmo:30, reloadTime:1500, fireRate:120, tracer:true },
    { name:"ショットガン", damage:12, pellets:6, spread:0.06, maxAmmo:8, reloadTime:1800, fireRate:500, tracer:true },
    { name:"スナイパーライフル", damage:80, maxAmmo:5, reloadTime:2000, fireRate:800, tracer:true },
    { name:"小機関銃", damage:18, maxAmmo:40, reloadTime:1400, fireRate:70, tracer:true }
  ];

  let currentWeaponIndex = 0;
  let ammo = weapons[0].maxAmmo;
  let lastShotTime = 0;
  let isReloading = false;

  const ENEMY_TYPES = {
    NORMAL: { name:"ノーマル", health:50, speed:0.04, color:"#cc33aa", fireRate:2000, damage:5 },
    FAST: { name:"ファスト", health:70, speed:0.12, color:"#44ddff", fireRate:800, damage:6 },
    SHOOTER: { name:"シューター", health:100, speed:0.03, color:"#ffaa33", fireRate:800, damage:10 },
    HEAVY: { name:"ヘビー", health:200, speed:0.02, color:"#ff6666", fireRate:2000, damage:15 },
    BOSS: { name:"ボス", health:800, speed:0.04, color:"#ff8800", fireRate:300, damage:20 }
  };

  // Projection
  function project3D(x, y, z) {
    const dx = x - player.x;
    const dy = y - player.y;
    const dz = z - player.z;
    const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
    const cp = Math.cos(player.pitch), sp = Math.sin(player.pitch);
    const rx = dx * cy - dz * sy;
    const rz = dx * sy + dz * cy;
    const ry = dy * cp - rz * sp;
    const rz2 = dy * sp + rz * cp;
    if (rz2 <= 0.1) return null;
    const fov = canvas.height || 600;
    return { x: canvas.width/2 + (rx / rz2) * fov, y: canvas.height/2 - (ry / rz2) * fov, z: rz2 };
  }

  // Map init
  function initMap(){
    walls = [];
    for (let i=-mapSize;i<=mapSize;i+=2){
      walls.push({ x1:-mapSize, z1:i, x2:-mapSize, z2:i+2, color:"#2a4a3a", height:4 });
      walls.push({ x1:mapSize, z1:i, x2:mapSize, z2:i+2, color:"#2a4a3a", height:4 });
      walls.push({ x1:i, z1:-mapSize, x2:i+2, z2:-mapSize, color:"#3a4a2a", height:4 });
      walls.push({ x1:i, z1:mapSize, x2:i+2, z2:mapSize, color:"#3a4a2a", height:4 });
    }
    for (let i=0;i<10;i++){
      const x = (Math.random()*2-1)*(mapSize-8);
      const z = (Math.random()*2-1)*(mapSize-8);
      const w = 4 + Math.random()*6;
      const h = 4 + Math.random()*6;
      walls.push({ x1:x, z1:z, x2:x+w, z2:z, color:"#4a3a2a", height:3 });
      walls.push({ x1:x+w, z1:z, x2:x+w, z2:z+h, color:"#3a3a4a", height:3 });
      walls.push({ x1:x+w, z1:z+h, x2:x, z2:z+h, color:"#4a3a2a", height:3 });
      walls.push({ x1:x, z1:z+h, x2:x, z2:z, color:"#3a3a4a", height:3 });
    }
  }

  // Collision
  function isColliding(x, z) {
    if (Math.abs(x) > mapSize-1 || Math.abs(z) > mapSize-1) return true;
    for (const w of walls){
      const minX = Math.min(w.x1,w.x2) - player.radius;
      const maxX = Math.max(w.x1,w.x2) + player.radius;
      const minZ = Math.min(w.z1,w.z2) - player.radius;
      const maxZ = Math.max(w.z1,w.z2) + player.radius;
      if (x>minX && x<maxX && z>minZ && z<maxZ) return true;
    }
    return false;
  }

  function isEnemyColliding(x, z) {
    const r = 0.75;
    if (Math.abs(x) > mapSize-1 || Math.abs(z) > mapSize-1) return true;
    for (const w of walls){
      const minX = Math.min(w.x1,w.x2) - r;
      const maxX = Math.max(w.x1,w.x2) + r;
      const minZ = Math.min(w.z1,w.z2) - r;
      const maxZ = Math.max(w.z1,w.z2) + r;
      if (x>minX && x<maxX && z>minZ && z<maxZ) return true;
    }
    return false;
  }

  // Spawns
  function spawnEnemy(typeKey) {
    const type = ENEMY_TYPES[typeKey] || ENEMY_TYPES.NORMAL;
    const x = (Math.random() * 2 - 1) * (mapSize - 5);
    const z = (Math.random() * 2 - 1) * (mapSize - 5);
    enemies.push({
      x, z, y: 1.5,
      health: type.health,
      maxHealth: type.health,
      speed: type.speed,
      type: typeKey,
      color: type.color,
      lastShot: 0,
      walkPhase: Math.random() * Math.PI * 2,
      targetX: x,
      targetZ: z,
      targetTimer: 0,
      fireRateMod: type.fireRate,
      stateTimer: 0,
      state: "patrol"
    });
  }

  function spawnHealItem() {
    const x = (Math.random() * 2 - 1) * (mapSize - 4);
    const z = (Math.random() * 2 - 1) * (mapSize - 4);
    healItems.push({ x, z, y: 0.5, size: 0.5, taken: false, rotation: 0 });
  }

  function checkHealPickup() {
    for (const item of healItems) {
      if (item.taken) continue;
      const dx = player.x - item.x;
      const dz = player.z - item.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      if (dist < 1.0) {
        item.taken = true;
        health = Math.min(100, health + 30);
        updateHUD();
        const snd = document.getElementById("sndHeal");
        if (snd) snd.play().catch(()=>{});
      }
    }
  }

  // Player update (defined before use)
  function updatePlayer(dt) {
    let dx = 0, dz = 0;
    if (keys.w) { dx += Math.sin(player.yaw); dz += Math.cos(player.yaw); }
    if (keys.s) { dx -= Math.sin(player.yaw); dz -= Math.cos(player.yaw); }
    if (keys.a) { dx -= Math.cos(player.yaw); dz += Math.sin(player.yaw); }
    if (keys.d) { dx += Math.cos(player.yaw); dz -= Math.sin(player.yaw); }
    if (dx !== 0 || dz !== 0) {
      const len = Math.hypot(dx, dz) || 1;
      dx = dx / len * player.speed * dt * 60;
      dz = dz / len * player.speed * dt * 60;
      const newX = player.x + dx;
      const newZ = player.z + dz;
      if (!isColliding(newX, player.z)) player.x = newX;
      if (!isColliding(player.x, newZ)) player.z = newZ;
    }
  }

  // Enemy AI
  function updateEnemies(dt) {
    const now = performance.now();
    for (const enemy of enemies) {
      const dx = player.x - enemy.x;
      const dz = player.z - enemy.z;
      const dist = Math.hypot(dx, dz);
      const type = ENEMY_TYPES[enemy.type] || ENEMY_TYPES.NORMAL;

      enemy.stateTimer = (enemy.stateTimer || 0) - dt;
      if (enemy.stateTimer <= 0) {
        if (dist < 15) { enemy.state = "chase"; enemy.stateTimer = 2; }
        else if (dist < 5 && health < 50) { enemy.state = "flee"; enemy.stateTimer = 3; }
        else { enemy.state = "patrol"; enemy.stateTimer = 3; }
      }

      if (enemy.state === "patrol") {
        enemy.targetTimer = (enemy.targetTimer || 0) - dt;
        if (enemy.targetTimer <= 0) {
          enemy.targetX = (Math.random()*2-1)*(mapSize-5);
          enemy.targetZ = (Math.random()*2-1)*(mapSize-5);
          enemy.targetTimer = 5;
        }
        const tdx = enemy.targetX - enemy.x;
        const tdz = enemy.targetZ - enemy.z;
        const tdist = Math.hypot(tdx, tdz) || 1;
        if (tdist > 0.5) {
          const mx = (tdx/tdist) * enemy.speed * dt * 60;
          const mz = (tdz/tdist) * enemy.speed * dt * 60;
          if (!isEnemyColliding(enemy.x + mx, enemy.z)) enemy.x += mx;
          if (!isEnemyColliding(enemy.x, enemy.z + mz)) enemy.z += mz;
        }
      } else if (enemy.state === "chase") {
        if (dist > 0.5) {
          const mx = (dx/dist) * enemy.speed * dt * 60;
          const mz = (dz/dist) * enemy.speed * dt * 60;
          if (!isEnemyColliding(enemy.x + mx, enemy.z)) enemy.x += mx;
          if (!isEnemyColliding(enemy.x, enemy.z + mz)) enemy.z += mz;
        }
      } else if (enemy.state === "flee") {
        if (dist < 20) {
          const mx = (-dx/dist) * enemy.speed * 1.5 * dt * 60;
          const mz = (-dz/dist) * enemy.speed * 1.5 * dt * 60;
          if (!isEnemyColliding(enemy.x + mx, enemy.z)) enemy.x += mx;
          if (!isEnemyColliding(enemy.x, enemy.z + mz)) enemy.z += mz;
        }
      }

      enemy.walkPhase = (enemy.walkPhase || 0) + enemy.speed * 10 * dt * 60;

      if (dist < 0.9) {
        health -= 10 * dt;
        updateHUD();
        const damageOverlay = document.querySelector(".damage-overlay");
        if (damageOverlay) { damageOverlay.classList.remove("active"); void damageOverlay.offsetWidth; damageOverlay.classList.add("active"); }
        const snd = document.getElementById("sndHurt");
        if (snd) snd.play().catch(()=>{});
        if (health <= 0) endGame();
      }

      if (dist < 30 && now - (enemy.lastShot || 0) > (enemy.fireRateMod || type.fireRate)) {
        enemy.lastShot = now;
        const dy = player.y - enemy.y;
        const dlen = Math.hypot(dx, dz, dy) || 1;
        const vx = (dx/dlen)*1.2;
        const vy = (dy/dlen)*1.2;
        const vz = (dz/dlen)*1.2;
        projectiles.push({ x:enemy.x,y:enemy.y,z:enemy.z, vx,vy,vz, life:3.0, owner:enemy, damage:type.damage });
        playEnemyShootSound();
      }
    }
  }

  // Projectiles
  function updateProjectiles(dt) {
    const removeIdx = [];
    for (let i = 0; i < projectiles.length; i++) {
      const p = projectiles[i];
      const nextX = p.x + p.vx * dt * 60;
      const nextY = p.y + p.vy * dt * 60;
      const nextZ = p.z + p.vz * dt * 60;

      if (isColliding(nextX, nextZ)) { p.life = 0; } else { p.x = nextX; p.y = nextY; p.z = nextZ; }

      p.life -= dt;

      if (p.life > 0) {
        if (p.owner === "player") {
          for (let j = 0; j < enemies.length; j++) {
            const enemy = enemies[j];
            const dist = Math.hypot(p.x - enemy.x, p.z - enemy.z);
            if (dist < 0.9) {
              enemy.health -= p.damage;
              p.life = 0;
              const snd = document.getElementById("sndHit");
              if (snd) snd.play().catch(()=>{});
              if (enemy.health <= 0) { enemies.splice(j, 1); j--; kills++; updateHUD(); }
              break;
            }
          }
        } else {
          const dxp = p.x - player.x;
          const dzp = p.z - player.z;
          if (Math.hypot(dxp, dzp) < 1.0) {
            health -= p.damage;
            p.life = 0;
            updateHUD();
            const damageOverlay = document.querySelector(".damage-overlay");
            if (damageOverlay) { damageOverlay.classList.remove("active"); void damageOverlay.offsetWidth; damageOverlay.classList.add("active"); }
            const snd = document.getElementById("sndHurt");
            if (snd) snd.play().catch(()=>{});
            if (health <= 0) endGame();
          }
        }
      }

      if (p.life <= 0) removeIdx.push(i);
    }
    for (let i = removeIdx.length - 1; i >= 0; i--) projectiles.splice(removeIdx[i], 1);
  }

  // Drawing helpers
  function drawHealItem(item) {
    const p = project3D(item.x, item.y, item.z);
    if (!p || p.z <= 0) return null;
    const size = 30 / p.z;
    const t = performance.now() * 0.007;
    const bob = Math.sin(t) * 5;
    item.rotation = (item.rotation || 0) + 0.05;
    return {
      z: p.z,
      draw: () => {
        ctx.save();
        ctx.translate(p.x, p.y + bob);
        ctx.rotate(item.rotation);
        const glowGrad = ctx.createRadialGradient(0, 0, size*0.2, 0, 0, size);
        glowGrad.addColorStop(0, `rgba(100,255,150,0.6)`);
        glowGrad.addColorStop(0.5, `rgba(50,255,100,0.3)`);
        glowGrad.addColorStop(1, `rgba(0,200,80,0)`);
        ctx.fillStyle = glowGrad;
        ctx.fillRect(-size, -size, size*2, size*2);
        const faces = [
          { points: [[-4,-4],[4,-4],[4,4],[-4,4]], color: "rgba(100,255,150,0.9)" },
          { points: [[-3,-3],[3,-3],[3,3],[-3,3]], color: "rgba(150,255,180,0.7)" }
        ];
        faces.forEach(face => {
          ctx.fillStyle = face.color;
          ctx.beginPath();
          ctx.moveTo(face.points[0][0], face.points[0][1]);
          for (let i = 1; i < face.points.length; i++) ctx.lineTo(face.points[i][0], face.points[i][1]);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = `rgba(255,255,200,0.5)`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        });
        ctx.strokeStyle = `rgba(255,255,200,0.9)`;
        ctx.lineWidth = 1;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(0, -6); ctx.lineTo(0, 6); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-6, 0); ctx.lineTo(6, 0); ctx.stroke();
        ctx.restore();
      }
    };
  }

  function drawEnemy(enemy) {
    const p = project3D(enemy.x, enemy.y, enemy.z);
    if (!p || p.z <= 0) return null;
    const size = 250 / p.z;
    const bob = Math.sin(enemy.walkPhase || 0) * (size*0.1);
    const hpRatio = Math.max(0, (enemy.health || 0) / (enemy.maxHealth || 1));
    const lightLevel = Math.max(0.4, 1 - p.z / 50);
    return {
      z: p.z,
      draw: () => {
        ctx.save();
        const bodyGrad = ctx.createLinearGradient(p.x - size/2, p.y - size, p.x + size/2, p.y);
        bodyGrad.addColorStop(0, enemy.color || "#cc33aa");
        bodyGrad.addColorStop(1, `rgba(0,0,0,${0.5 * lightLevel})`);
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(p.x-size/2, p.y-size + bob, size, size*1.5);
        ctx.strokeStyle = `rgba(0,0,0,${0.5 * lightLevel})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x-size/2, p.y-size + bob, size, size*1.5);
        const headSize = size*0.45;
        const headGrad = ctx.createRadialGradient(p.x - headSize*0.2, p.y-size*1.15 + bob - headSize*0.2, headSize*0.2, p.x, p.y-size*1.2 + bob, headSize);
        headGrad.addColorStop(0, `rgba(220,170,120,${0.9 * lightLevel})`);
        headGrad.addColorStop(0.6, `rgba(200,150,100,${0.85 * lightLevel})`);
        headGrad.addColorStop(1, `rgba(140,90,60,${0.7 * lightLevel})`);
        ctx.fillStyle = headGrad;
        ctx.beginPath();
        ctx.arc(p.x, p.y-size*1.2 + bob, headSize, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = `rgba(0,0,0,${0.4 * lightLevel})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        const eyeY = p.y-size*1.25 + bob;
        ctx.fillStyle = `rgba(50,20,20,${lightLevel})`;
        ctx.beginPath(); ctx.arc(p.x-size*0.15, eyeY, size*0.12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(p.x+size*0.15, eyeY, size*0.12, 0, Math.PI*2); ctx.fill();
        const pupilColor = enemy.state === "chase" ? "#ff3333" : enemy.state === "flee" ? "#ffff00" : "#ff9933";
        ctx.fillStyle = pupilColor;
        const pupilOffset = Math.sin(enemy.walkPhase || 0) * size * 0.03;
        ctx.beginPath(); ctx.arc(p.x-size*0.15 + pupilOffset, eyeY, size*0.06, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(p.x+size*0.15 + pupilOffset, eyeY, size*0.06, 0, Math.PI*2); ctx.fill();
        const hpWidth = size * 1.2;
        const hpHeight = size*0.18;
        const hpY = p.y-size*1.8 + bob;
        ctx.fillStyle = `rgba(0,0,0,${0.6 * lightLevel})`;
        ctx.fillRect(p.x-hpWidth/2, hpY, hpWidth, hpHeight);
        ctx.strokeStyle = `rgba(100,100,100,${0.5 * lightLevel})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(p.x-hpWidth/2, hpY, hpWidth, hpHeight);
        const hpColor = hpRatio>0.5 ? "#00ff00" : hpRatio>0.25 ? "#ffff00" : "#ff0000";
        const hpGrad = ctx.createLinearGradient(p.x-hpWidth/2, hpY, p.x-hpWidth/2, hpY+hpHeight);
        hpGrad.addColorStop(0, `${hpColor}99`);
        hpGrad.addColorStop(1, hpColor);
        ctx.fillStyle = hpGrad;
        ctx.fillRect(p.x-hpWidth/2, hpY, hpWidth*hpRatio, hpHeight);
        ctx.restore();
      }
    };
  }

  function drawWall(wall) {
    const h = wall.height || 3;
    const pts = [
      project3D(wall.x1,0,wall.z1),
      project3D(wall.x2,0,wall.z2),
      project3D(wall.x2,h,wall.z2),
      project3D(wall.x1,h,wall.z1)
    ];
    if (pts.some(p=>!p || p.z<=0)) return null;
    const avgZ = (pts[0].z+pts[1].z+pts[2].z+pts[3].z)/4;
    const distance = Math.max(0.3, 1 - avgZ / 45);
    return {
      z:avgZ,
      draw:()=>{
        ctx.beginPath();
        ctx.moveTo(pts[0].x,pts[0].y);
        ctx.lineTo(pts[1].x,pts[1].y);
        ctx.lineTo(pts[2].x,pts[2].y);
        ctx.lineTo(pts[3].x,pts[3].y);
        ctx.closePath();
        ctx.fillStyle = wall.color || "#444";
        ctx.globalAlpha = distance;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = `rgba(0,0,0,${0.6 * distance})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    };
  }

  function drawProjectiles() {
    for (const p of projectiles){
      const pr = project3D(p.x,p.y,p.z);
      if (!pr) continue;
      const r = Math.max(2.5, 8/pr.z);
      if (p.owner === "player") {
        const bulletGrad = ctx.createRadialGradient(pr.x - r*0.3, pr.y - r*0.3, 0, pr.x, pr.y, r);
        bulletGrad.addColorStop(0, "rgba(255,255,200,1)");
        bulletGrad.addColorStop(1, "rgba(200,200,50,0.4)");
        ctx.fillStyle = bulletGrad;
        ctx.beginPath(); ctx.arc(pr.x, pr.y, r, 0, Math.PI*2); ctx.fill();
      } else {
        const bulletGrad = ctx.createRadialGradient(pr.x - r*0.3, pr.y - r*0.3, 0, pr.x, pr.y, r);
        bulletGrad.addColorStop(0, "rgba(255,150,150,1)");
        bulletGrad.addColorStop(1, "rgba(200,50,50,0.4)");
        ctx.fillStyle = bulletGrad;
        ctx.beginPath(); ctx.arc(pr.x, pr.y, r, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawMinimap() {
    const size = 150;
    ctx.save();
    ctx.translate(canvas.width-size-20,20);
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = "#666";
    walls.forEach(w=>{
      const cx = (w.x1+w.x2)/2;
      const cz = (w.z1+w.z2)/2;
      ctx.fillRect((cx+mapSize)/(mapSize*2)*size-2,(cz+mapSize)/(mapSize*2)*size-2,4,4);
    });
    ctx.fillStyle = "#f44";
    enemies.forEach(e=>{
      ctx.beginPath();
      ctx.arc((e.x+mapSize)/(mapSize*2)*size,(e.z+mapSize)/(mapSize*2)*size,3,0,Math.PI*2);
      ctx.fill();
    });
    ctx.fillStyle = "#0f0";
    healItems.forEach(item => {
      if (!item.taken) {
        ctx.beginPath();
        ctx.arc((item.x+mapSize)/(mapSize*2)*size,(item.z+mapSize)/(mapSize*2)*size,2,0,Math.PI*2);
        ctx.fill();
      }
    });
    ctx.fillStyle = "#0f0";
    ctx.beginPath();
    ctx.arc((player.x+mapSize)/(mapSize*2)*size,(player.z+mapSize)/(mapSize*2)*size,4,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Shooting / reload / sounds
  function playShootSound() {
    const original = document.getElementById("sndShootPlayer");
    if (!original) return;
    const s = original.cloneNode();
    s.volume = 1.0;
    s.play().catch(()=>{});
  }
  function playEnemyShootSound() {
    const original = document.getElementById("sndShootEnemy");
    if (!original) return;
    const s = original.cloneNode();
    s.volume = 0.6;
    s.play().catch(()=>{});
  }

  function reload() {
    if (isReloading) return;
    const weapon = weapons[currentWeaponIndex];
    if (ammo === weapon.maxAmmo) return;
    isReloading = true;
    const ammoEl = document.getElementById("ammo");
    if (ammoEl) ammoEl.textContent = "...";
    setTimeout(() => { ammo = weapon.maxAmmo; isReloading = false; updateHUD(); }, weapon.reloadTime);
  }

  function shoot() {
    if (!gameRunning || isReloading) return;
    const now = performance.now();
    const weapon = weapons[currentWeaponIndex];
    if (now - lastShotTime < weapon.fireRate) return;
    if (ammo <= 0) { reload(); return; }
    lastShotTime = now;
    ammo--;
    updateHUD();
    const flash = document.querySelector(".muzzle-flash");
    if (flash) { flash.classList.remove("active"); void flash.offsetWidth; flash.classList.add("active"); }
    playShootSound();
    const yaw = player.yaw, pitch = player.pitch;
    const dirX = Math.sin(yaw)*Math.cos(pitch);
    const dirY = Math.sin(pitch);
    const dirZ = Math.cos(yaw)*Math.cos(pitch);
    if (currentWeaponIndex === 1) {
      const weaponSpec = weapons[1];
      for (let i=0;i<weaponSpec.pellets;i++){
        const spreadYaw = (Math.random()-0.5)*weaponSpec.spread;
        const spreadPitch = (Math.random()-0.5)*weaponSpec.spread;
        const sy = yaw + spreadYaw;
        const sp = pitch + spreadPitch;
        const vx = Math.sin(sy)*Math.cos(sp);
        const vy = Math.sin(sp);
        const vz = Math.cos(sy)*Math.cos(sp);
        projectiles.push({ x:player.x,y:player.y,z:player.z, vx:vx*1.2,vy:vy*1.2,vz:vz*1.2, life:2.5, owner:"player", damage:weaponSpec.damage });
      }
    } else {
      const speed = currentWeaponIndex === 2 ? 2.5 : 1.6;
      projectiles.push({ x:player.x,y:player.y,z:player.z, vx:dirX*speed,vy:dirY*speed,vz:dirZ*speed, life:3.0, owner:"player", damage:weapon.damage });
    }
    tracerLines.push({ x1:canvas.width/2,y1:canvas.height/2, x2:canvas.width/2 + dirX*200,y2:canvas.height/2 - dirY*200, life:0.4 });
    if (ammo <= 0) reload();
  }

  // HUD and game control
  function updateHUD() {
    const healthEl = document.getElementById("health"); if (healthEl) healthEl.textContent = Math.max(0, Math.floor(health));
    const weaponNameEl = document.getElementById("weaponName"); if (weaponNameEl) weaponNameEl.textContent = weapons[currentWeaponIndex].name;
    const ammoEl = document.getElementById("ammo"); if (ammoEl) ammoEl.textContent = ammo;
    const maxAmmoEl = document.getElementById("maxAmmo"); if (maxAmmoEl) maxAmmoEl.textContent = weapons[currentWeaponIndex].maxAmmo;
    const killsEl = document.getElementById("kills"); if (killsEl) killsEl.textContent = kills;
    const modeEl = document.getElementById("modeName"); if (modeEl) modeEl.textContent = mode;
    const healCountEl = document.getElementById("healItemsCount"); if (healCountEl) healCountEl.textContent = healItems.filter(i => !i.taken).length;
    const playerLabel = document.getElementById("playerNameLabel"); if (playerLabel) playerLabel.textContent = playerName;
  }

  function startGame(selectedMode) {
    mode = selectedMode;
    health = 100; kills = 0; currentWeaponIndex = 0; ammo = weapons[0].maxAmmo; isReloading = false; lastShotTime = 0;
    tracerLines = []; projectiles = []; enemies = []; healItems = []; healSpawnTimer = 0;
    waveNumber = 1; waveEnemyCount = 0; waveSpawnTimer = 0; practiceScore = 0;
    player.x = 0; player.z = 0; player.yaw = 0; player.pitch = 0;
    initMap(); updateHUD();
    const start = document.getElementById("startScreen"); if (start) start.style.display = "none";
    const gameOver = document.getElementById("gameOverScreen"); if (gameOver) gameOver.style.display = "none";
    gameRunning = true;
    const bgm1 = document.getElementById("bgm1"); const bgm2 = document.getElementById("bgm2"); const bgm3 = document.getElementById("bgm3");
    if (bgm1) { bgm1.pause(); bgm1.currentTime = 0; } if (bgm2) { bgm2.pause(); bgm2.currentTime = 0; } if (bgm3) { bgm3.pause(); bgm3.currentTime = 0; }
    if (Math.random() < 0.5) { if (bgm2) { bgm2.volume = 0.25; bgm2.play().catch(()=>{}); } } else { if (bgm3) { bgm3.volume = 0.25; bgm3.play().catch(()=>{}); } }
    if (mode === "NORMAL") { for (let i = 0; i < 8; i++) spawnEnemy("NORMAL"); }
    else if (mode === "SPEEDRUN") { speedrunStart = performance.now(); for (let i = 0; i < 10; i++) spawnEnemy("FAST"); }
    else if (mode === "SURVIVAL") { survivalStart = performance.now(); for (let i = 0; i < 5; i++) spawnEnemy("NORMAL"); }
    else if (mode === "WAVE") { waveNumber = 1; waveEnemyCount = 3; for (let i = 0; i < waveEnemyCount; i++) spawnEnemy("NORMAL"); }
    else if (mode === "PRACTICE") { practiceScore = 0; for (let i = 0; i < 3; i++) spawnEnemy("NORMAL"); }
    const timerBox = document.getElementById("timerBox"); if (timerBox) timerBox.style.display = mode === "SPEEDRUN" ? "block" : "none";
    const surviveBox = document.getElementById("surviveBox"); if (surviveBox) surviveBox.style.display = mode === "SURVIVAL" ? "block" : "none";
    const waveBox = document.getElementById("waveBox"); if (waveBox) waveBox.style.display = mode === "WAVE" ? "block" : "none";
    const bossHpBox = document.getElementById("bossHpBox"); if (bossHpBox) bossHpBox.style.display = "none";
    canvas.requestPointerLock?.();
  }

  function endGame() {
    gameRunning = false;
    document.exitPointerLock?.();
    const finalKills = document.getElementById("finalKills"); if (finalKills) finalKills.textContent = kills;
    const gameOver = document.getElementById("gameOverScreen"); if (gameOver) gameOver.style.display = "flex";
  }

  function resetGameState() {
    player.x = 0; player.z = 0; player.yaw = 0; player.pitch = 0;
    enemies = []; projectiles = []; tracerLines = []; healItems = []; health = 100; kills = 0;
  }

  // Save slots (localStorage)
  const SLOT_KEY_PREFIX = "tacops_slot_";
  let currentSlotSelection = 0;
  let _pendingOverwriteSlot = null;
  let _pendingEditSlot = null;

  function saveToSlot(slot, force=false, slotName=null) {
    const key = SLOT_KEY_PREFIX + slot;
    const existing = localStorage.getItem(key);
    if (existing && !force) { showOverwriteModal(slot); return false; }
    const data = {
      player: { x: player.x, y: player.y, z: player.z, yaw: player.yaw, pitch: player.pitch, health: health, weaponIndex: currentWeaponIndex, ammo: ammo },
      playerName: playerName,
      mode: mode,
      enemies: enemies.map(e => ({ x: e.x, y: e.y, z: e.z, health: e.health, maxHealth: e.maxHealth, type: e.type, color: e.color, lastShot: e.lastShot, walkPhase: e.walkPhase, targetX: e.targetX, targetZ: e.targetZ, state: e.state })),
      healItems: healItems.map(h => ({ x: h.x, y: h.y, z: h.z, taken: h.taken, size: h.size, rotation: h.rotation })),
      walls: walls,
      waveNumber: waveNumber,
      waveEnemyCount: waveEnemyCount,
      survivalTime: survivalTime,
      speedrunStart: speedrunStart,
      savedAt: Date.now(),
      slotName: slotName ?? (existing ? (JSON.parse(existing).slotName || null) : null)
    };
    try { localStorage.setItem(key, JSON.stringify(data)); updateSlotButtons(); return true; } catch (e) { console.error("slot save failed", e); return false; }
  }

  function loadFromSlot(slot) {
    const key = SLOT_KEY_PREFIX + slot;
    const json = localStorage.getItem(key);
    if (!json) { alert("セーブスロット " + slot + " は空です"); return false; }
    try { const data = JSON.parse(json); loadGameFromData(data); return true; } catch (e) { console.error("slot load failed", e); alert("セーブデータの読み込みに失敗しました"); return false; }
  }

  function updateSlotButtons() {
    for (let i = 1; i <= 3; i++) {
      const btn = document.getElementById("slotBtn" + i);
      if (!btn) continue;
      const json = localStorage.getItem(SLOT_KEY_PREFIX + i);
      if (!json) { btn.textContent = `Slot ${i}: 空`; btn.title = "右クリックでセーブ / ダブルクリックでロード / クリックで選択"; }
      else {
        try {
          const data = JSON.parse(json);
          const date = data.savedAt ? new Date(data.savedAt) : null;
          const label = data.slotName ? data.slotName : (date ? `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}` : "保存済");
          btn.textContent = `Slot ${i}: ${label}`;
          btn.title = "右クリックでセーブ / ダブルクリックでロード / クリックで選択 / Alt+クリックで名前編集";
        } catch { btn.textContent = `Slot ${i}: 不明`; }
      }
      if (currentSlotSelection === i) btn.classList.add("slot-selected"); else btn.classList.remove("slot-selected");
    }
  }

  function selectSlot(slot) { currentSlotSelection = slot; updateSlotButtons(); }

  function showOverwriteModal(slot) {
    _pendingOverwriteSlot = slot;
    const modal = document.getElementById("overwriteModal");
    const msg = document.getElementById("overwriteMessage");
    const json = localStorage.getItem(SLOT_KEY_PREFIX + slot);
    let label = `Slot ${slot} を上書きしますか？`;
    if (json) {
      try {
        const data = JSON.parse(json);
        const date = data.savedAt ? new Date(data.savedAt) : null;
        const name = data.slotName || null;
        label = `Slot ${slot} を上書きしますか？ ${name ? "["+name+"] " : ""}${date ? date.toLocaleString() : ""}`;
      } catch {}
    }
    if (msg) msg.textContent = label;
    if (modal) modal.style.display = "flex";
  }
  function hideOverwriteModal() { const modal = document.getElementById("overwriteModal"); if (modal) modal.style.display = "none"; _pendingOverwriteSlot = null; }

  function showSlotNameModal(slot) {
    _pendingEditSlot = slot;
    const modal = document.getElementById("slotNameModal");
    const input = document.getElementById("slotNameInput");
    const json = localStorage.getItem(SLOT_KEY_PREFIX + slot);
    let name = "";
    if (json) {
      try { const data = JSON.parse(json); name = data.slotName || ""; } catch {}
    }
    if (input) input.value = name;
    if (modal) modal.style.display = "flex";
  }
  function hideSlotNameModal() { const modal = document.getElementById("slotNameModal"); if (modal) modal.style.display = "none"; _pendingEditSlot = null; }

  // Save/load main
  function applyPlayerName() {
    const input = document.getElementById("playerNameInput");
    if (input) { playerName = input.value.trim() || "PLAYER"; localStorage.setItem("tacops_playerName", playerName); }
    const label = document.getElementById("playerNameLabel"); if (label) label.textContent = playerName;
  }

  function saveGame() {
    const data = {
      player: { x: player.x, y: player.y, z: player.z, yaw: player.yaw, pitch: player.pitch, health: health, weaponIndex: currentWeaponIndex, ammo: ammo },
      playerName: playerName, mode: mode,
      enemies: enemies.map(e => ({ x: e.x, y: e.y, z: e.z, health: e.health, type: e.type, state: e.state, targetX: e.targetX, targetZ: e.targetZ, lastShot: e.lastShot, walkPhase: e.walkPhase })),
      healItems: healItems.map(h => ({ x: h.x, y: h.y, z: h.z, taken: h.taken, size: h.size, rotation: h.rotation })),
      walls: walls, waveNumber: waveNumber, waveEnemyCount: waveEnemyCount, survivalTime: survivalTime, speedrunStart: speedrunStart
    };
    try {
      localStorage.setItem("tacops_save", JSON.stringify(data));
      localStorage.setItem("tacops_playerName", playerName);
      alert("セーブ完了");
    } catch (e) {
      console.error("saveGame failed", e);
      alert("セーブに失敗しました");
    }
  }

  function loadGameFromData(data) {
    if (!data || !data.player) { alert("不正なセーブデータです"); return; }
    player.x = data.player.x ?? player.x; player.y = data.player.y ?? player.y; player.z = data.player.z ?? player.z;
    player.yaw = data.player.yaw ?? player.yaw; player.pitch = data.player.pitch ?? player.pitch;
    health = data.player.health ?? health; currentWeaponIndex = data.player.weaponIndex ?? currentWeaponIndex; ammo = data.player.ammo ?? ammo;
    playerName = data.playerName || playerName; const nameLabel = document.getElementById("playerNameLabel"); if (nameLabel) nameLabel.textContent = playerName;
    mode = data.mode || mode;
    enemies = (data.enemies || []).map(e => ({ x: e.x, y: e.y ?? 1.5, z: e.z, health: e.health ?? (ENEMY_TYPES[e.type]?.health || 50), maxHealth: e.maxHealth ?? (ENEMY_TYPES[e.type]?.health || 50), speed: e.speed ?? (ENEMY_TYPES[e.type]?.speed || 0.04), type: e.type || "NORMAL", color: e.color || (ENEMY_TYPES[e.type]?.color || "#cc33aa"), lastShot: e.lastShot || 0, walkPhase: e.walkPhase || (Math.random() * Math.PI * 2), targetX: e.targetX ?? e.x, targetZ: e.targetZ ?? e.z, targetTimer: e.targetTimer || 0, fireRateMod: e.fireRateMod || (ENEMY_TYPES[e.type]?.fireRate || 1000), stateTimer: e.stateTimer || 0, state: e.state || "patrol" }));
    healItems = (data.healItems || []).map(h => ({ x: h.x, y: h.y ?? 0.5, z: h.z, size: h.size ?? 0.5, taken: h.taken || false, rotation: h.rotation || 0 }));
    walls = data.walls || walls;
    waveNumber = data.waveNumber ?? waveNumber; waveEnemyCount = data.waveEnemyCount ?? waveEnemyCount; survivalTime = data.survivalTime ?? survivalTime; speedrunStart = data.speedrunStart ?? speedrunStart;
    updateHUD();
    const start = document.getElementById("startScreen"); if (start) start.style.display = "none";
    const gameOver = document.getElementById("gameOverScreen"); if (gameOver) gameOver.style.display = "none";
    const pause = document.getElementById("pauseScreen"); if (pause) pause.style.display = "none";
    gameRunning = true;
  }

  function loadGame() {
    const json = localStorage.getItem("tacops_save");
    if (!json) { alert("セーブデータがありません"); return; }
    try { const data = JSON.parse(json); loadGameFromData(data); } catch (err) { console.error(err); alert("セーブデータの読み込みに失敗しました"); }
  }

  // Game loop
  function resize(){ canvas.width = canvas.clientWidth || window.innerWidth; canvas.height = canvas.clientHeight || window.innerHeight; }

  let gameRunning = false;
  let mode = "NORMAL";
  let isPaused = false;
  let isPointerLocked = false;

  function gameLoop(now) {
    const dt = Math.min((now - lastTime)/1000, 0.016);
    lastTime = now;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawFloorAndSky();
    const drawables = [];
    for (const w of walls) { const d = drawWall(w); if (d) drawables.push(d); }
    for (const e of enemies) { const d = drawEnemy(e); if (d) drawables.push(d); }
    for (const item of healItems) { if (!item.taken) { const d = drawHealItem(item); if (d) drawables.push(d); } }
    drawables.sort((a,b)=>b.z - a.z); drawables.forEach(d=>d.draw());
    drawProjectiles(); drawMinimap();

    if (gameRunning && !isPaused) {
      try {
        updatePlayer(dt);
        updateEnemies(dt);
        updateProjectiles(dt);
        checkHealPickup();
      } catch (err) {
        console.error("Runtime error in update loop:", err);
      }

      healSpawnTimer += dt;
      if (healSpawnTimer > 15) { healSpawnTimer = 0; spawnHealItem(); }

      if (mode === "SPEEDRUN") {
        const elapsed = (now - speedrunStart) / 1000;
        const timerEl = document.getElementById("timer"); if (timerEl) timerEl.textContent = elapsed.toFixed(2);
        if (enemies.length === 0 && kills >= 10) endGame();
      } else if (mode === "SURVIVAL") {
        const elapsed = (now - survivalStart) / 1000;
        const surviveEl = document.getElementById("surviveTime"); if (surviveEl) surviveEl.textContent = elapsed.toFixed(2);
        if (enemies.length < 3) spawnEnemy(Math.random() < 0.3 ? "SHOOTER" : "FAST");
      } else if (mode === "WAVE") {
        waveSpawnTimer += dt;
        if (enemies.length === 0 && waveSpawnTimer > 2) {
          waveNumber++; waveEnemyCount = 3 + waveNumber * 2; waveSpawnTimer = 0;
          for (let i = 0; i < waveEnemyCount; i++) spawnEnemy(Math.random() < 0.4 ? "FAST" : Math.random() < 0.5 ? "HEAVY" : "SHOOTER");
          if (waveNumber % 5 === 0) spawnEnemy("BOSS");
          const waveEl = document.getElementById("waveNumber"); if (waveEl) waveEl.textContent = waveNumber;
        }
      } else if (mode === "PRACTICE") {
        if (enemies.length < 2) spawnEnemy("NORMAL");
        const killsEl = document.getElementById("kills"); if (killsEl) killsEl.textContent = `スコア: ${kills * 100}`;
      } else if (mode === "NORMAL") {
        if (enemies.length === 0) endGame();
      }
    }

    requestAnimationFrame(gameLoop);
  }

  function drawFloorAndSky() {
    const skyGrad = ctx.createLinearGradient(0,0,0,canvas.height/2);
    skyGrad.addColorStop(0,"#0a0a15"); skyGrad.addColorStop(0.5,"#151530"); skyGrad.addColorStop(1,"#1a1a35");
    ctx.fillStyle = skyGrad; ctx.fillRect(0,0,canvas.width,canvas.height/2);
    const floorGrad = ctx.createLinearGradient(0,canvas.height/2,0,canvas.height);
    floorGrad.addColorStop(0,"#1a1a1a"); floorGrad.addColorStop(1,"#000000");
    ctx.fillStyle = floorGrad; ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);
  }

  // Event registration
  document.addEventListener("DOMContentLoaded", () => {
    resize();
    initMap();
    updateHUD();
    updateSlotButtons();

    // Buttons
    const sNormal = document.getElementById("startNormal"); if (sNormal) sNormal.addEventListener("click", () => { goFullscreen(); startGame("NORMAL"); });
    const sSpeed = document.getElementById("startSpeedrun"); if (sSpeed) sSpeed.addEventListener("click", () => { goFullscreen(); startGame("SPEEDRUN"); });
    const sSurv = document.getElementById("startSurvival"); if (sSurv) sSurv.addEventListener("click", () => { goFullscreen(); startGame("SURVIVAL"); });
    const sWave = document.getElementById("startWave"); if (sWave) sWave.addEventListener("click", () => { goFullscreen(); startGame("WAVE"); });
    const sPractice = document.getElementById("startPractice"); if (sPractice) sPractice.addEventListener("click", () => { goFullscreen(); startGame("PRACTICE"); });

    const pauseSaveBtn = document.getElementById("pauseSaveBtn");
    if (pauseSaveBtn) pauseSaveBtn.onclick = () => {
      if (currentSlotSelection >= 1 && currentSlotSelection <= 3) {
        saveToSlot(currentSlotSelection, true);
        alert("選択スロットにセーブしました");
      } else saveGame();
    };

    const pauseLoadBtn = document.getElementById("pauseLoadBtn");
    if (pauseLoadBtn) pauseLoadBtn.onclick = () => {
      if (currentSlotSelection >= 1 && currentSlotSelection <= 3) loadFromSlot(currentSlotSelection);
      else loadGame();
    };

    const homeBtn = document.getElementById("homeBtn"); if (homeBtn) homeBtn.onclick = () => { try { window.location.href = "../index.html"; } catch(e){} };
    const restartBtn = document.getElementById("restartBtn"); if (restartBtn) restartBtn.addEventListener("click", () => startGame(mode));
    const pauseResumeBtn = document.getElementById("pauseResumeBtn"); if (pauseResumeBtn) pauseResumeBtn.addEventListener("click", () => { const pause = document.getElementById("pauseScreen"); if (pause) pause.style.display = "none"; isPaused = false; canvas.requestPointerLock?.(); });
    const pauseTitleBtn = document.getElementById("pauseTitleBtn"); if (pauseTitleBtn) pauseTitleBtn.addEventListener("click", () => { const pause = document.getElementById("pauseScreen"); if (pause) pause.style.display = "none"; const gameOver = document.getElementById("gameOverScreen"); if (gameOver) gameOver.style.display = "none"; const start = document.getElementById("startScreen"); if (start) start.style.display = "flex"; gameRunning = false; resetGameState(); const bgm1 = document.getElementById("bgm1"); if (bgm1) { bgm1.volume = 0.25; bgm1.play().catch(()=>{}); } });

    const backToTitleBtn = document.getElementById("backToTitleBtn"); if (backToTitleBtn) backToTitleBtn.addEventListener("click", () => { const gameOver = document.getElementById("gameOverScreen"); if (gameOver) gameOver.style.display = "none"; const start = document.getElementById("startScreen"); if (start) start.style.display = "flex"; gameRunning = false; resetGameState(); const bgm1 = document.getElementById("bgm1"); if (bgm1) { bgm1.volume = 0.25; bgm1.play().catch(()=>{}); } });

    // Slot buttons
    for (let i = 1; i <= 3; i++) {
      const btn = document.getElementById("slotBtn" + i);
      if (!btn) continue;
      btn.addEventListener("click", (ev) => {
        if (ev.altKey) { showSlotNameModal(i); return; }
        selectSlot(i);
      });
      btn.addEventListener("dblclick", () => { loadFromSlot(i); });
      btn.addEventListener("contextmenu", (ev) => {
        ev.preventDefault();
        const key = SLOT_KEY_PREFIX + i;
        const existing = localStorage.getItem(key);
        if (existing) showOverwriteModal(i);
        else { saveToSlot(i, true); updateSlotButtons(); alert("Slot " + i + " にセーブしました"); }
      });
    }

    const overwriteConfirm = document.getElementById("overwriteConfirm");
    const overwriteCancel = document.getElementById("overwriteCancel");
    if (overwriteConfirm) overwriteConfirm.addEventListener("click", () => { if (_pendingOverwriteSlot) { saveToSlot(_pendingOverwriteSlot, true); updateSlotButtons(); alert("上書き保存しました"); } hideOverwriteModal(); });
    if (overwriteCancel) overwriteCancel.addEventListener("click", () => { hideOverwriteModal(); });

    const slotNameSave = document.getElementById("slotNameSave");
    const slotNameCancel = document.getElementById("slotNameCancel");
    if (slotNameSave) slotNameSave.addEventListener("click", () => {
      const input = document.getElementById("slotNameInput");
      if (!_pendingEditSlot) { hideSlotNameModal(); return; }
      const name = input ? input.value.trim() : "";
      const key = SLOT_KEY_PREFIX + _pendingEditSlot;
      const json = localStorage.getItem(key);
      if (!json) { saveToSlot(_pendingEditSlot, true, name); }
      else {
        try { const data = JSON.parse(json); data.slotName = name; localStorage.setItem(key, JSON.stringify(data)); } catch { saveToSlot(_pendingEditSlot, true, name); }
      }
      updateSlotButtons(); hideSlotNameModal();
    });
    if (slotNameCancel) slotNameCancel.addEventListener("click", () => { hideSlotNameModal(); });

    const autosaveToggle = document.getElementById("autosaveToggle");
    const autosaveStored = localStorage.getItem("tacops_autosave");
    if (autosaveToggle) { autosaveToggle.checked = autosaveStored === "1"; autosaveToggle.addEventListener("change", () => { localStorage.setItem("tacops_autosave", autosaveToggle.checked ? "1" : "0"); }); }

    const playerNameInput = document.getElementById("playerNameInput");
    if (playerNameInput) playerNameInput.addEventListener("change", () => { applyPlayerName(); });

    // Start loop safely
    console.log("Starting game loop. Functions present:", typeof updatePlayer, typeof updateEnemies, typeof updateProjectiles, typeof checkHealPickup);
    requestAnimationFrame(gameLoop);
  });

  // Keyboard / mouse / pointer lock
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      const pause = document.getElementById("pauseScreen");
      if (!isPaused) {
        if (pause) pause.style.display = "flex";
        isPaused = true;
        const autosave = localStorage.getItem("tacops_autosave") === "1";
        if (autosave && currentSlotSelection >= 1 && currentSlotSelection <= 3) { saveToSlot(currentSlotSelection, true); updateSlotButtons(); }
      } else {
        if (pause) pause.style.display = "none";
        isPaused = false;
        canvas.requestPointerLock?.();
      }
    }
    const key = (e.key || "").toLowerCase();
    if (key in keys) keys[key] = true;
    if (key === "r") reload();
    if (key === "1") { currentWeaponIndex = 0; ammo = Math.min(ammo, weapons[0].maxAmmo); updateHUD(); }
    if (key === "2") { currentWeaponIndex = 1; ammo = Math.min(ammo, weapons[1].maxAmmo); updateHUD(); }
    if (key === "3") { currentWeaponIndex = 2; ammo = Math.min(ammo, weapons[2].maxAmmo); updateHUD(); }
    if (key === "4") { currentWeaponIndex = 3; ammo = Math.min(ammo, weapons[3].maxAmmo); updateHUD(); }
  });

  document.addEventListener("keyup", e => { const key = (e.key || "").toLowerCase(); if (key in keys) keys[key] = false; });

  document.addEventListener("mousemove", e => {
    if (!gameRunning || !isPointerLocked || isPaused) return;
    player.yaw += (e.movementX || 0) * 0.003;
    player.pitch -= (e.movementY || 0) * 0.003;
    const limit = Math.PI/2.5;
    if (player.pitch > limit) player.pitch = limit;
    if (player.pitch < -limit) player.pitch = -limit;
  });

  document.addEventListener("pointerlockchange", () => { isPointerLocked = document.pointerLockElement === canvas; });

  canvas.addEventListener("click", () => {
    if (!isPointerLocked) { canvas.requestPointerLock(); return; }
    if (gameRunning && !isPaused) shoot();
  });

  window.addEventListener("resize", resize);

  // Defensive: ensure no undefined references for open/close pause functions
  window.openPauseMenu = window.openPauseMenu || function() { const pause = document.getElementById("pauseScreen"); if (pause) pause.style.display = "flex"; isPaused = true; };
  window.closePauseMenu = window.closePauseMenu || function() { const pause = document.getElementById("pauseScreen"); if (pause) pause.style.display = "none"; isPaused = false; };

  // Expose minimal debug helpers (safe)
  window.tacops = {
    startGame, endGame, saveGame, loadGame, saveToSlot, loadFromSlot, updateHUD
  };
  </script>
</body>
</html>
