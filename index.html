<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>TACTICAL FPS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>
    html,body{
      margin:0;height:100%;overflow:hidden;
      background:#000;color:#0f0;
      font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* ▼ 起動アニメーション（5秒） */
    #bootScreen{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:#000;display:flex;align-items:center;justify-content:center;
      flex-direction:column;z-index:9999;color:#00ffea;
      font-family:'Courier New',monospace;text-align:center;
    }

    /* ▼ アイリスアウト（円が広がる） */
    #iris{
      position:fixed;top:50%;left:50%;
      width:0;height:0;
      background:#000;
      border-radius:50%;
      transform:translate(-50%,-50%);
      z-index:9998;
      pointer-events:none;
      transition:width 1.2s ease-out, height 1.2s ease-out;
    }

    /* ▼ メニュー */
    .start-screen{
      position:absolute;top:0;left:0;width:100%;height:100%;
      background:linear-gradient(135deg,#0a0a15 0%,#1a1a2e 50%,#050509 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:10;opacity:0;transition:opacity 0.8s;
    }

    .btn{
      padding:14px 45px;font-size:18px;
      background:linear-gradient(135deg,#00ff64 0%,#00dd55 50%,#00aa44 100%);
      border:2px solid #00ff64;border-radius:2px;
      cursor:pointer;font-weight:bold;color:#000;margin:10px;
      transition:all 0.2s;
      box-shadow:0 0 20px rgba(0,255,100,0.4)
    }
    .btn:hover{transform:scale(1.05);}

    .download-btn{
      background:linear-gradient(135deg,#ffaa00 0%,#ff8800 100%);
      border-color:#ffaa00;color:#000;
    }

    .quit-btn{
      background:#444;color:#fff;border:2px solid #666;
    }
  </style>
</head>

<body>

  <!-- ▼ 起動アニメーション -->
  <div id="bootScreen">
    <div style="font-size:42px;font-weight:bold;letter-spacing:3px;
      text-shadow:0 0 10px #00eaff,0 0 25px #00eaff;">
      TACTICAL FPS
    </div>
    <div id="loadingText" style="margin-top:20px;font-size:20px;color:#00eaff;">
      LOADING.
    </div>
  </div>

  <!-- ▼ アイリスアウト -->
  <div id="iris"></div>

  <!-- ▼ ホーム画面 -->
  <div class="start-screen" id="menu">
    <h1 style="font-size:48px;color:#00ff64;margin-bottom:10px">TACTICAL FPS</h1>

    <button class="btn" onclick="startGame()">▶ スタート</button>

    <a id="downloadBtn" class="btn download-btn" href="#" style="margin-top:20px;">
      最新の EXE をダウンロード
    </a>

    <button id="quitBtn" class="btn quit-btn" style="margin-top:20px;">
      ✖ ゲームをやめる
    </button>
  </div>

  <script>
    /* ▼ 5秒間 LOADING. → LOADING.. → LOADING... を繰り返す */
    const loading = document.getElementById("loadingText");
    let dots = 1;
    const dotTimer = setInterval(()=>{
      dots = (dots % 3) + 1;
      loading.textContent = "LOADING" + ".".repeat(dots);
    },500);

    /* ▼ 5秒後：アイリスアウト開始 */
    setTimeout(()=>{
      clearInterval(dotTimer);

      const iris = document.getElementById("iris");

      /* ▼ 画面全体を覆うサイズ（確実に開く） */
      iris.style.width = "300vmax";
      iris.style.height = "300vmax";

      /* ▼ 1.2秒後：メニュー表示 */
      setTimeout(()=>{
        document.getElementById("bootScreen").style.display="none";
        document.getElementById("menu").style.opacity="1";
      },1200);

    },5000);

    /* ▼ PC / モバイル振り分け */
    function startGame(){
      const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if(isMobile){
        window.location.href="mobile/mobile.html";
      } else {
        window.location.href="PC/PC.html";
      }
    }

    /* ▼ 最新 EXE 自動取得 */
    fetch("https://api.github.com/repos/haruto3210/3dgame-tactical-fps/releases/latest")
      .then(res=>res.json())
      .then(data=>{
        const exe=data.assets.find(a=>a.name.endsWith(".exe"));
        if(exe){
          const btn=document.getElementById("downloadBtn");
          btn.href=exe.browser_download_url;
          btn.setAttribute("download","");
        } else {
          document.getElementById("downloadBtn").innerText="EXE が見つかりません";
        }
      });

    /* ▼ ゲームをやめる（全 OS で確実に離脱） */
    document.getElementById("quitBtn").onclick=()=>{
      window.open('','_self');
      window.close();
      window.location.href="https://www.google.com";
    };
  </script>

</body>
</html>
