<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>TACTICAL OPS — ADVANCED</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- ▼ ファビコン -->
  <link rel="icon" type="image/png" href="icon/icon.png">

  <style>
    html,body{
      margin:0;height:100%;overflow:hidden;
      background:#000;color:#0f0;
      font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* ▼ ネオン電光掲示板 */
    .marquee {
      width: 100%;
      padding: 12px 0;
      overflow: hidden;
      white-space: nowrap;
      font-size: 20px;
      font-weight: bold;
      position: absolute;
      top: 0;
      z-index: 200;

      background: rgba(0,0,0,0.6);
      color: #00ffea;
      text-shadow:
        0 0 6px #00fff2,
        0 0 12px #00e6ff,
        0 0 20px #00c8ff,
        0 0 30px #00aaff;
      border-bottom: 2px solid #00eaff;
      box-shadow: 0 0 20px #00eaff;
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 12s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }

    /* ▼ 中央メニュー */
    .start-screen{
      position:absolute;top:0;left:0;width:100%;height:100%;
      background:linear-gradient(135deg,#0a0a15 0%,#1a1a2e 50%,#050509 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:100;
    }

    .btn{
      padding:14px 45px;font-size:18px;
      background:linear-gradient(135deg,#00ff64 0%,#00dd55 50%,#00aa44 100%);
      border:2px solid #00ff64;border-radius:2px;
      cursor:pointer;font-weight:bold;color:#000;margin:10px;
      transition:all 0.2s;text-shadow:0 2px 4px rgba(0,0,0,0.3);
      box-shadow:0 0 20px rgba(0,255,100,0.4)
    }
    .btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(0,255,100,0.7)}

    /* ▼ ダウンロードボタン */
    .download-btn{
      background:linear-gradient(135deg,#ffaa00 0%,#ff8800 100%);
      border-color:#ffaa00;
      color:#000;
    }

    /* ▼ ゲームをやめるボタン */
    .quit-btn{
      background:#444;
      color:#fff;
      border:2px solid #666;
    }
  </style>
</head>

<body>

  <!-- ▼ ネオン電光掲示板（閉じタグ修正済み） -->
  <div class="marquee">
    <span>
      このサイトのゲームはバージョンが更新されません。最新のAPPを入手したい場合は、下のダウンロードボタンを押してください。
      このサイトのゲームはバージョンが更新されません。最新のAPPを入手したい場合は、下のダウンロードボタンを押してください。
    </span>
  </div>

  <!-- ▼ ホーム画面 -->
  <div class="start-screen">
    <h1 style="font-size:48px;color:#00ff64;margin-bottom:10px">TACTICAL FPSweb</h1>

    <!-- スタートボタン -->
    <button class="btn" onclick="startGame()">▶ スタート</button>

    <!-- 最新 EXE 自動ダウンロード -->
    <a id="downloadBtn" class="btn download-btn" href="#" style="margin-top:20px;">
      最新の EXE をダウンロード
    </a>

    <!-- ▼ ゲームをやめる（サイトを閉じる） -->
    <button id="quitBtn" class="btn quit-btn" style="margin-top:20px;">
      ✖ ゲームをやめる
    </button>
  </div>

  <script>
    // ▼ PC / モバイル振り分け
    function startGame(){
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if(isMobile){
        window.location.href = "mobile/mobile.html";
      } else {
        window.location.href = "PC/PC.html";
      }
    }

    // ▼ GitHub API から最新 EXE を自動取得
    fetch("https://api.github.com/repos/haruto3210/3dgame-tactical-fps/releases/latest")
      .then(res => res.json())
      .then(data => {
        const exe = data.assets.find(a => a.name.endsWith(".exe"));
        if(exe){
          const btn = document.getElementById("downloadBtn");
          btn.href = exe.browser_download_url;
          btn.setAttribute("download", "");
        } else {
          document.getElementById("downloadBtn").innerText = "EXE が見つかりません";
        }
      });

    // ▼ ゲームをやめる（タブを閉じる or 戻る）
    document.getElementById("quitBtn").onclick = () => {
      window.open('', '_self');
      window.close();
      history.back();
    };
  </script>

</body>
</html>
