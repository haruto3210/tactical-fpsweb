<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>TACTICAL OPS — MOBILE</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<link rel="icon" type="image/png" href="icon.png">

<style>
@supports (width: 100dvw) { html, body { width: 100dvw; } }

/* Reset */
*{margin:0;padding:0;box-sizing:border-box}

/* Viewport sizing */
html,body{
  width:100%;
  height:100dvh;
  overflow:hidden;
  background:#000;
  color:#0f0;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
}

/* Orientation warning */
.orientation-warning {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100dvh;
  background: #000;
  color: #0f0;
  font-family: monospace;
  z-index: 99999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}
.orientation-warning.active { display:flex; }
@media (orientation: portrait) {
  .orientation-warning.active { display:flex !important; }
}

/* Game container */
#game-container{
  position:relative;
  width:100%;
  height:100dvh;
  overflow:hidden;
}

/* Canvas */
canvas{
  display:block;
  width:100%;
  height:100%;
  image-rendering:crisp-edges;
  touch-action:none;
}

/* Crosshair */
.crosshair{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:10;
}
.crosshair::before,.crosshair::after{
  content:'';
  position:absolute;
  background:rgba(0,255,100,0.85);
  box-shadow:0 0 8px rgba(0,255,100,0.7),inset 0 0 4px rgba(0,255,100,0.3);
}
.crosshair::before{ width:24px; height:2px; top:50%; left:50%; transform:translate(-50%,-50%); }
.crosshair::after{ width:2px; height:24px; top:50%; left:50%; transform:translate(-50%,-50%); }
.crosshair .dot{ position:absolute; width:3px; height:3px; background:rgba(0,255,100,1); border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 4px rgba(0,255,100,0.8); }

/* HUD */
.hud{
  position:fixed;
  top:20px;
  left:20px;
  color:#00ff64;
  font-family:'Courier New',monospace;
  text-shadow:0 0 15px rgba(0,255,100,0.6),0 0 30px rgba(0,255,100,0.2);
  z-index:25;
  font-size:13px;
  line-height:1.6;
  background:rgba(0,20,0,0.4);
  padding:12px;
  border:1px solid rgba(0,255,100,0.3);
  border-radius:2px;
  backdrop-filter:blur(4px);
  text-align:left;
}

/* Muzzle flash / damage */
.muzzle-flash{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:120px; height:120px; background:radial-gradient(circle at 30% 30%,rgba(255,220,100,0.95) 0%,rgba(255,180,50,0.7) 20%,rgba(255,100,0,0.3) 50%,transparent 75%); pointer-events:none; opacity:0; z-index:5; filter:drop-shadow(0 0 20px rgba(255,150,0,0.8)); }
.muzzle-flash.active{ animation:flash 0.12s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes flash{ 0%{opacity:1;transform:translate(-50%,-50%) scale(0.3)} 50%{opacity:0.8} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)} }

.damage-overlay{ position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:4; opacity:0; background:radial-gradient(ellipse at center,transparent 30%,rgba(255,40,40,0.5) 60%,rgba(200,0,0,0.3) 100%); }
.damage-overlay.active{ animation:damage 0.4s ease-out; }
@keyframes damage{ 0%{opacity:1} 100%{opacity:0} }

/* lookPad (right half) */
#lookPad{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100dvh;
  z-index:9999;
  background:rgba(0,0,0,0);
  pointer-events:auto; /* will be toggled by JS when controls show */
}

/* Start screen: ensure it's above controls */
.start-screen{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100dvh;
  background:linear-gradient(135deg,#0a0a15 0%,#1a1a2e 50%,#050509 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:30000; /* high so home overlays controls */
  overflow-y:auto;
  padding:20px;
}

/* Buttons */
.btn{ padding:14px 45px; font-size:16px; background:linear-gradient(135deg,#00ff64 0%,#00dd55 50%,#00aa44 100%); border:2px solid #00ff64; border-radius:2px; cursor:pointer; font-weight:bold; color:#000; margin:8px; transition:all 0.2s; text-shadow:0 2px 4px rgba(0,0,0,0.3); box-shadow:0 0 20px rgba(0,255,100,0.4); touch-action:manipulation; }
.btn:hover,.btn:active{ transform:scale(1.05); box-shadow:0 0 30px rgba(0,255,100,0.7); }

.game-over-screen{ position:absolute; top:0; left:0; width:100%; height:100dvh; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(8px); overflow-y:auto; padding:20px; }

.btn-red{ background:linear-gradient(135deg,#ff4444 0%,#cc0000 100%); color:#fff; border:2px solid #ff4444; }
.btn-red:hover,.btn-red:active{ box-shadow:0 0 30px rgba(255,0,0,0.6); }

.pause-screen{ position:fixed; top:0; left:0; width:100%; height:100dvh; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:9999; pointer-events:auto; overflow-y:auto; padding:20px; }

/* mobile controls (fixed, above lookPad) */
/* NOTE: initial display is none in HTML attribute; JS will show/hide */
.mobile-controls{
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: auto;
  z-index: 20001; /* above lookPad */
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 20px 10px;
  gap: 15px;
  pointer-events: auto;
  box-sizing: border-box;
}

/* left control pad */
.control-pad{ width:120px; height:120px; background:rgba(0,0,0,0.5); border:2px solid rgba(0,255,100,0.3); border-radius:8px; position:relative; pointer-events:auto; }

/* dpad buttons */
.dpad-btn{ position:absolute; width:35px; height:35px; background:rgba(0,255,100,0.3); border:1px solid rgba(0,255,100,0.5); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#0f0; font-size:12px; font-weight:bold; user-select:none; transition:0.1s; touch-action:manipulation; }
.dpad-btn:active{ background:rgba(0,255,100,0.6); transform:scale(0.95); }
.dpad-btn.up{top:5px;left:50%;transform:translateX(-50%)} .dpad-btn.down{bottom:5px;left:50%;transform:translateX(-50%)} .dpad-btn.left{left:5px;top:50%;transform:translateY(-50%)} .dpad-btn.right{right:5px;top:50%;transform:translateY(-50%)}

/* action buttons container (right) */
.action-buttons{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; pointer-events:auto; position: relative; z-index: 20002; }

/* individual action buttons — do NOT set position:fixed here */
.action-btn{ width:50px; height:50px; border:2px solid; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px; display:flex; align-items:center; justify-content:center; text-align:center; transition:0.1s; user-select:none; touch-action:manipulation; color:#000; z-index:20003; }
.action-btn:active{ transform:scale(0.95); }

.fire-btn{ background:linear-gradient(135deg,#ff3333 0%,#cc0000 100%); border-color:#ff3333; color:#fff; }
.reload-btn{ background:linear-gradient(135deg,#ffaa33 0%,#ff8800 100%); border-color:#ffaa33; color:#000; }
.weapon-btn{ background:linear-gradient(135deg,#0088ff 0%,#0066dd 100%); border-color:#0088ff; color:#fff; }

/* pause button (top-right) */
.pause-btn{ position:fixed; top:15px; right:15px; width:45px; height:45px; background:rgba(0,0,0,0.5); border:2px solid rgba(0,255,100,0.4); border-radius:6px; color:#0f0; font-size:20px; font-weight:bold; display:flex; align-items:center; justify-content:center; touch-action:manipulation; z-index:100000; }
.pause-btn:active{ transform:scale(0.92); background:rgba(0,255,100,0.2); }

/* responsive */
@media (max-width:600px){
  .btn{padding:12px 30px;font-size:14px;margin:6px}
  .start-screen h1{font-size:32px}
  .start-screen p{font-size:14px}
  .hud{font-size:10px;padding:8px;top:10px;right:10px}
  .mobile-controls{bottom:0;padding:15px}
  .control-pad{width:100px;height:100px}
  .dpad-btn{width:30px;height:30px;font-size:10px}
  .action-btn{width:45px;height:45px;font-size:10px}
}
</style>
</head>
<body>
<div id="game-container">
  <div id="orientationWarning" class="orientation-warning">
    <div style="font-size: 32px; text-align: center;">📱 横向きにしてください！</div>
    <div style="font-size: 16px; color: #aaa; text-align: center;">ゲームは横向きでのプレイが推奨されます</div>
    <button class="btn" id="okBtn" style="margin-top: 20px;">OK</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="crosshair"><div class="dot"></div></div>

  <div class="muzzle-flash"></div>
  <div class="damage-overlay"></div>

  <div id="lookPad"></div>

  <div class="hud">
    <div>TACTICAL OPS</div>
    <div> モード: <span id="modeName">NORMAL</span></div>
    <div> 体力: <span id="health">100</span></div>
    <div> 武器: <span id="weaponName">Rifle</span></div>
    <div> 残弾数: <span id="ammo">30</span> / <span id="maxAmmo">30</span></div>
    <div> 殺した人数: <span id="kills">0</span></div>
    <div style="color:#00ff00"> 回復アイテム: <span id="healItemsCount">0</span></div>
    <div id="timerBox" style="display:none"> タイム: <span id="timer">0.00</span>s</div>
    <div id="surviveBox" style="display:none"> 生き残った時間: <span id="surviveTime">0.00</span>s</div>
    <div id="waveBox" style="display:none"> ウェーブ: <span id="waveNumber">1</span></div>
    <div id="bossHpBox" style="display:none;color:#ff6600"> ボス体力: <span id="bossHp">0</span></div>
  </div>

  <!-- mobileControls: initial hidden via inline style so JS can show it reliably -->
  <div class="mobile-controls" id="mobileControls" style="display:none;">
    <div class="control-pad">
      <div class="dpad-btn up" id="btnUp"> ▲ </div>
      <div class="dpad-btn down" id="btnDown"> ▼ </div>
      <div class="dpad-btn left" id="btnLeft"> ◀ </div>
      <div class="dpad-btn right" id="btnRight"> ▶ </div>
    </div>

    <div class="action-buttons">
      <button id="pauseBtn" class="pause-btn">II</button>
      <button class="action-btn fire-btn" id="fireBtn">射撃</button>
      <button class="action-btn reload-btn" id="reloadBtn">装填</button>
      <button class="action-btn weapon-btn" id="weaponBtn">武器</button>
    </div>
  </div>

  <!-- Audio tags (keep or remove depending on whether files exist) -->
  <audio id="sndHit" src="hit.mp3"></audio>
  <audio id="sndHurt" src="hurt.mp3"></audio>
  <audio id="sndExplosion" src="explosion.mp3"></audio>
  <audio id="sndMissile" src="missile.mp3"></audio>
  <audio id="sndHeal" src="heal.mp3"></audio>
  <audio id="bgm1" src="bgm1.mp3" loop></audio>
  <audio id="bgm2" src="bgm2.mp3" loop></audio>
  <audio id="bgm3" src="bgm3.mp3" loop></audio>
  <audio id="sndShootPlayer" src="player_shoot.mp3"></audio>
  <audio id="sndShootEnemy" src="enemy_shoot.mp3"></audio>

  <div class="start-screen" id="startScreen">
    <h1 style="font-size:40px;color:#00ff64;margin-bottom:10px">TACTICAL FPS-WEB MOBILE</h1>
    <p style="color:#aaa;font-family:monospace;margin-bottom:20px">敵を全滅させましょう。モードを選択してください</p>
    <button class="btn" id="startNormal">▶ ノーマル</button>
    <button class="btn" id="startSpeedrun">▶ スピードラン</button>
    <button class="btn" id="startSurvival">▶ サバイバル</button>
    <button class="btn" id="startWave" style="background:linear-gradient(135deg,#ffaa00 0%,#ff8800 100%);border-color:#ffaa00">⚡ ウェーブ戦</button>
    <button class="btn" id="startPractice" style="background:linear-gradient(135deg,#00aaff 0%,#0088dd 100%);border-color:#00aaff">▶ 射撃練習</button>
    <button id="homeBtn" class="btn-home" style="margin-top:18px;">🏠 ホームに戻る</button>
  </div>

  <div class="game-over-screen" id="gameOverScreen">
    <h1 style="font-size:48px;color:#ff3333;margin-bottom:10px">ゲームオーバー</h1>
    <p style="color:#ccc;font-family:monospace;font-size:20px;margin:10px 0">殺した人数: <span id="finalKills">0</span>人</p>
    <p id="finalModeInfo" style="color:#0f0;font-family:monospace;font-size:18px;margin-top:10px"></p>
    <button class="btn btn-red" id="restartBtn">↻ もう一度</button>
    <button class="btn" id="backToTitleBtn" style="margin-top:15px;background:#444;color:#fff">⬅ タイトルに戻る</button>
  </div>

  <div class="pause-screen" id="pauseScreen">
    <h1 style="font-size:40px;color:#00d0ff;margin-bottom:10px">一時停止</h1>
    <p style="color:#ccc;font-family:monospace;font-size:18px;margin:10px 0">殺した人数: <span id="pauseKills">0</span>人</p>
    <button class="btn btn-red" id="pauseResumeBtn">▶ ゲームに戻る</button>
    <button class="btn" id="pauseTitleBtn" style="margin-top:15px;background:#333;color:#fff">⬅ タイトルに戻る</button>
  </div>
</div>

<script>
/* =========================
   DOM refs and UI helpers
   ========================= */
const mobileControlsEl = document.getElementById("mobileControls");
const startScreenEl = document.getElementById("startScreen");
const gameOverScreenEl = document.getElementById("gameOverScreen");
const pauseScreenEl = document.getElementById("pauseScreen");
const lookPadEl = document.getElementById("lookPad");

/* Utility: safe play (only if src exists) */
function safePlay(id) {
  const el = document.getElementById(id);
  if (!el) return;
  // If no src attribute or empty, skip
  if (!el.src) return;
  el.play?.().catch(()=>{});
}

/* Show/hide helpers */
function showStartScreen() {
  if (startScreenEl) startScreenEl.style.display = "flex";
  if (gameOverScreenEl) gameOverScreenEl.style.display = "none";
  if (pauseScreenEl) pauseScreenEl.style.display = "none";
  if (mobileControlsEl) {
    // hide controls and ensure they don't receive pointer events
    mobileControlsEl.style.display = "none";
    mobileControlsEl.style.pointerEvents = "none";
  }
  // enable lookPad interactions when on start screen
  if (lookPadEl) lookPadEl.style.pointerEvents = "auto";
  gameRunning = false;
}

function showGameControls() {
  if (startScreenEl) startScreenEl.style.display = "none";
  if (gameOverScreenEl) gameOverScreenEl.style.display = "none";
  if (pauseScreenEl) pauseScreenEl.style.display = "none";
  if (mobileControlsEl) {
    // Use setProperty with important to override any CSS specificity
    mobileControlsEl.style.setProperty('display','flex','important');
    mobileControlsEl.style.pointerEvents = 'auto';
  }
  // disable lookPad pointer events so buttons receive touches
  if (lookPadEl) lookPadEl.style.pointerEvents = 'none';
  gameRunning = true;
}

function hideGameControlsForGameOver() {
  if (mobileControlsEl) {
    mobileControlsEl.style.display = 'none';
    mobileControlsEl.style.pointerEvents = 'none';
  }
  if (gameOverScreenEl) gameOverScreenEl.style.display = 'flex';
  // re-enable lookPad so user can look around on game over if desired
  if (lookPadEl) lookPadEl.style.pointerEvents = 'auto';
  gameRunning = false;
}

/* =========================
   Basic setup & variables
   ========================= */
function isMobileDevice() { return true; }

let gameRunning = false;
let mode = "NORMAL";
let isPaused = false;
let isPointerLocked = false;
let isTouchDevice = isMobileDevice();
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const keys = { w:false, a:false, s:false, d:false };
const mapSize = 30;
const player = { x:0, y:1.5, z:0, yaw:0, pitch:0, speed:0.18, radius:0.4 };
let health = 100;
let kills = 0;
let walls = [];
let enemies = [];
let projectiles = [];
let tracerLines = [];
let healItems = [];
let lastTime = performance.now();
let healSpawnTimer = 0;
let speedrunStart = 0;
let survivalStart = 0;
let survivalTime = 0;
let waveNumber = 1;
let waveEnemyCount = 0;
let waveSpawnTimer = 0;
let practiceScore = 0;

/* weapons */
const weapons = [
  { name:"ライフル", damage:30, maxAmmo:30, reloadTime:1500, fireRate:120, tracer:true },
  { name:"ショットガン", damage:12, pellets:6, spread:0.06, maxAmmo:8, reloadTime:1800, fireRate:500, tracer:true },
  { name:"スナイパーライフル", damage:80, maxAmmo:5, reloadTime:2000, fireRate:800, tracer:true },
  { name:"小機関銃", damage:18, maxAmmo:40, reloadTime:1400, fireRate:70, tracer:true }
];
let currentWeaponIndex = 0;
let ammo = weapons[0].maxAmmo;
let lastShotTime = 0;
let isReloading = false;

/* lookPad touch vars */
let lookPadTouchStartX = 0;
let lookPadTouchStartY = 0;
let isLookPadTouching = false;
let lpStartTime = 0;
let lpMoved = false;

/* =========================
   Resize / orientation
   ========================= */
function resizeCanvas() {
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);

/* orientation warning */
function checkOrientation() {
  const warningDiv = document.getElementById("orientationWarning");
  if (!warningDiv) return;
  if (window.innerHeight > window.innerWidth) warningDiv.classList.add("active");
  else warningDiv.classList.remove("active");
}
window.addEventListener("orientationchange", checkOrientation);
window.addEventListener("resize", checkOrientation);

/* fullscreen helper */
function goFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
}
const okBtn = document.getElementById("okBtn");
if (okBtn) okBtn.addEventListener("click", () => {
  const w = document.getElementById("orientationWarning");
  if (w) w.classList.remove("active");
});

/* =========================
   Input bindings
   ========================= */
function setupDpadButton(id, keyStart, keyEnd) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener("touchstart", (e) => { e.preventDefault(); e.stopPropagation(); keyStart(); }, { passive: false });
  el.addEventListener("touchend", (e) => { e.preventDefault(); e.stopPropagation(); keyEnd(); }, { passive: false });
  el.addEventListener("touchcancel", (e) => { e.preventDefault(); keyEnd(); }, { passive: false });
}
setupDpadButton("btnUp", () => { keys.w = true; }, () => { keys.w = false; });
setupDpadButton("btnDown", () => { keys.s = true; }, () => { keys.s = false; });
setupDpadButton("btnLeft", () => { keys.a = true; }, () => { keys.a = false; });
setupDpadButton("btnRight", () => { keys.d = true; }, () => { keys.d = false; });

/* action buttons */
const fireBtn = document.getElementById("fireBtn");
if (fireBtn) {
  fireBtn.addEventListener("touchstart", (e) => { e.preventDefault(); e.stopPropagation(); if (gameRunning && !isPaused) shoot(); }, { passive: false });
  fireBtn.addEventListener("touchend", (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });
}
const reloadBtn = document.getElementById("reloadBtn");
if (reloadBtn) {
  reloadBtn.addEventListener("touchstart", (e) => { e.preventDefault(); e.stopPropagation(); if (gameRunning && !isPaused) reload(); }, { passive: false });
  reloadBtn.addEventListener("touchend", (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });
}
const weaponBtn = document.getElementById("weaponBtn");
if (weaponBtn) {
  weaponBtn.addEventListener("touchstart", (e) => { e.preventDefault(); e.stopPropagation(); if (gameRunning) { currentWeaponIndex = (currentWeaponIndex + 1) % weapons.length; ammo = Math.min(ammo, weapons[currentWeaponIndex].maxAmmo); updateHUD(); } }, { passive: false });
  weaponBtn.addEventListener("touchend", (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });
}

/* pause button */
const pauseBtn = document.getElementById("pauseBtn");
if (pauseBtn) {
  pauseBtn.addEventListener("touchstart", (e) => {
    e.preventDefault(); e.stopPropagation();
    if (!gameRunning) return;
    isPaused = true;
    if (pauseScreenEl) pauseScreenEl.style.display = "flex";
  }, { passive: false });
  pauseBtn.addEventListener("touchend", (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });
}

/* lookPad handlers */
if (lookPadEl) {
  lookPadEl.addEventListener("touchstart", (e) => {
    if (!gameRunning || isPaused) return;
    e.preventDefault(); e.stopPropagation();
    const t = e.touches[0];
    lookPadTouchStartX = t.clientX;
    lookPadTouchStartY = t.clientY;
    lpStartTime = performance.now();
    lpMoved = false;
    isLookPadTouching = true;
  }, { passive: false });

  lookPadEl.addEventListener("touchmove", (e) => {
    if (!isLookPadTouching || !gameRunning || isPaused || !e.touches.length) return;
    e.preventDefault(); e.stopPropagation();
    const t = e.touches[0];
    const dx = t.clientX - lookPadTouchStartX;
    const dy = t.clientY - lookPadTouchStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) lpMoved = true;
    player.yaw += dx * 0.005;
    player.pitch -= dy * 0.005;
    const limit = Math.PI / 2.5;
    if (player.pitch > limit) player.pitch = limit;
    if (player.pitch < -limit) player.pitch = -limit;
    lookPadTouchStartX = t.clientX;
    lookPadTouchStartY = t.clientY;
  }, { passive: false });

  lookPadEl.addEventListener("touchend", (e) => {
    e.preventDefault(); e.stopPropagation();
    if (e.target && e.target.closest && e.target.closest(".action-btn")) {
      isLookPadTouching = false;
      return;
    }
    const duration = performance.now() - lpStartTime;
    if (!lpMoved && duration < 180 && gameRunning && !isPaused) shoot();
    isLookPadTouching = false;
  }, { passive: false });
}

/* =========================
   Core game functions (kept minimal here)
   ========================= */
function project3D(x, y, z) {
  const dx = x - player.x;
  const dy = y - player.y;
  const dz = z - player.z;
  const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
  const cp = Math.cos(player.pitch), sp = Math.sin(player.pitch);
  const rx = dx * cy - dz * sy;
  const rz = dx * sy + dz * cy;
  const ry = dy * cp - rz * sp;
  const rz2 = dy * sp + rz * cp;
  if (rz2 <= 0.1) return null;
  const fov = canvas.height;
  return { x: canvas.width/2 + (rx / rz2) * fov, y: canvas.height/2 - (ry / rz2) * fov, z: rz2 };
}

function isColliding(x, z) {
  if (Math.abs(x) > mapSize-1 || Math.abs(z) > mapSize-1) return true;
  for (const w of walls){
    const minX = Math.min(w.x1,w.x2) - player.radius;
    const maxX = Math.max(w.x1,w.x2) + player.radius;
    const minZ = Math.min(w.z1,w.z2) - player.radius;
    const maxZ = Math.max(w.z1,w.z2) + player.radius;
    if (x>minX && x<maxX && z>minZ && z<maxZ) return true;
  }
  return false;
}

/* Minimal implementations for shoot/reload/update to keep page functional */
function shoot() {
  if (!gameRunning || isReloading) return;
  const now = performance.now();
  const weapon = weapons[currentWeaponIndex];
  if (now - lastShotTime < weapon.fireRate) return;
  if (ammo <= 0) { reload(); return; }
  lastShotTime = now;
  ammo--;
  updateHUD();
  const flash = document.querySelector(".muzzle-flash");
  if (flash) { flash.classList.remove("active"); void flash.offsetWidth; flash.classList.add("active"); }
  safePlay('sndShootPlayer');
  // projectile logic omitted for brevity
}

function reload() {
  if (isReloading) return;
  const weapon = weapons[currentWeaponIndex];
  if (ammo === weapon.maxAmmo) return;
  isReloading = true;
  const ammoEl = document.getElementById("ammo");
  if (ammoEl) ammoEl.textContent = "...";
  setTimeout(() => { ammo = weapon.maxAmmo; isReloading = false; updateHUD(); }, weapon.reloadTime);
}

/* update HUD / map / spawn (kept minimal) */
function updateHUD() {
  const healthEl = document.getElementById("health");
  if (healthEl) healthEl.textContent = Math.floor(health);
  const weaponEl = document.getElementById("weaponName");
  if (weaponEl) weaponEl.textContent = weapons[currentWeaponIndex].name;
  const ammoEl = document.getElementById("ammo");
  if (ammoEl) ammoEl.textContent = ammo;
  const maxAmmoEl = document.getElementById("maxAmmo");
  if (maxAmmoEl) maxAmmoEl.textContent = weapons[currentWeaponIndex].maxAmmo;
  const killsEl = document.getElementById("kills");
  if (killsEl) killsEl.textContent = kills;
  const modeEl = document.getElementById("modeName");
  if (modeEl) modeEl.textContent = mode;
  const healCountEl = document.getElementById("healItemsCount");
  if (healCountEl) healCountEl.textContent = healItems.filter(i => !i.taken).length;
}

function initMap(){
  walls.length = 0;
  for (let i=-mapSize;i<=mapSize;i+=2){
    walls.push({ x1:-mapSize, z1:i, x2:-mapSize, z2:i+2, color:"#2a4a3a", height:4 });
    walls.push({ x1:mapSize, z1:i, x2:mapSize, z2:i+2, color:"#2a4a3a", height:4 });
    walls.push({ x1:i, z1:-mapSize, x2:i+2, z2:-mapSize, color:"#3a4a2a", height:4 });
    walls.push({ x1:i, z1:mapSize, x2:i+2, z2:mapSize, color:"#3a4a2a", height:4 });
  }
}

/* =========================
   Start / End game
   ========================= */
function startGame(selectedMode) {
  // ensure controls visible and lookPad disabled for touches
  showGameControls();

  mode = selectedMode;
  health = 100;
  kills = 0;
  currentWeaponIndex = 0;
  ammo = weapons[0].maxAmmo;
  isReloading = false;
  lastShotTime = 0;
  tracerLines = [];
  projectiles = [];
  enemies = [];
  healItems = [];
  healSpawnTimer = 0;
  waveNumber = 1;
  waveEnemyCount = 0;
  waveSpawnTimer = 0;
  practiceScore = 0;
  player.x = 0;
  player.z = 0;
  player.yaw = 0;
  player.pitch = 0;
  initMap();
  updateHUD();
  if (startScreenEl) startScreenEl.style.display = "none";
  if (gameOverScreenEl) gameOverScreenEl.style.display = "none";
  gameRunning = true;
  // safe bgm start
  const bgm1 = document.getElementById("bgm1");
  const bgm2 = document.getElementById("bgm2");
  const bgm3 = document.getElementById("bgm3");
  if (bgm1) { bgm1.pause(); bgm1.currentTime = 0; }
  if (bgm2) { bgm2.pause(); bgm2.currentTime = 0; }
  if (bgm3) { bgm3.pause(); bgm3.currentTime = 0; }
  if (Math.random() < 0.5) { safePlay('bgm2'); } else { safePlay('bgm3'); }
  if (mode === "NORMAL") { for (let i = 0; i < 8; i++) spawnEnemy("NORMAL"); }
  else if (mode === "SPEEDRUN") { speedrunStart = performance.now(); for (let i = 0; i < 10; i++) spawnEnemy("FAST"); }
  else if (mode === "SURVIVAL") { survivalStart = performance.now(); for (let i = 0; i < 5; i++) spawnEnemy("NORMAL"); }
  else if (mode === "WAVE") { waveNumber = 1; waveEnemyCount = 3; for (let i = 0; i < waveEnemyCount; i++) spawnEnemy("NORMAL"); }
  else if (mode === "PRACTICE") { practiceScore = 0; for (let i = 0; i < 3; i++) spawnEnemy("NORMAL"); }
  const timerBox = document.getElementById("timerBox");
  if (timerBox) timerBox.style.display = mode === "SPEEDRUN" ? "block" : "none";
  const surviveBox = document.getElementById("surviveBox");
  if (surviveBox) surviveBox.style.display = mode === "SURVIVAL" ? "block" : "none";
  const waveBox = document.getElementById("waveBox");
  if (waveBox) waveBox.style.display = mode === "WAVE" ? "block" : "none";
  const bossHpBox = document.getElementById("bossHpBox");
  if (bossHpBox) bossHpBox.style.display = "none";
}

function endGame() {
  hideGameControlsForGameOver();
  gameRunning = false;
  document.exitPointerLock?.();
  const finalKills = document.getElementById("finalKills");
  if (finalKills) finalKills.textContent = kills;
  if (gameOverScreenEl) gameOverScreenEl.style.display = "flex";
}

function resetGameState() {
  player.x = 0; player.z = 0; player.yaw = 0; player.pitch = 0;
  enemies = []; projectiles = []; tracerLines = []; healItems = [];
  health = 100; kills = 0;
}

function openPauseMenu() {
  if (pauseScreenEl) pauseScreenEl.style.display = "flex";
  isPaused = true;
}
function closePauseMenu() {
  if (pauseScreenEl) pauseScreenEl.style.display = "none";
  isPaused = false;
  if (!isTouchDevice) canvas.requestPointerLock();
}

/* =========================
   UI event bindings
   ========================= */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (!isPaused && gameRunning) openPauseMenu();
    else if (isPaused) closePauseMenu();
  }
});

const homeBtn = document.getElementById("homeBtn");
if (homeBtn) homeBtn.onclick = () => { window.location.href = "../index.html"; };

const pauseResumeBtn = document.getElementById("pauseResumeBtn");
if (pauseResumeBtn) pauseResumeBtn.addEventListener("click", closePauseMenu);

const pauseTitleBtn = document.getElementById("pauseTitleBtn");
if (pauseTitleBtn) pauseTitleBtn.addEventListener("click", () => {
  closePauseMenu();
  if (gameOverScreenEl) gameOverScreenEl.style.display = "none";
  showStartScreen();
  resetGameState();
  safePlay('bgm1');
});

const backToTitleBtn = document.getElementById("backToTitleBtn");
if (backToTitleBtn) backToTitleBtn.addEventListener("click", () => {
  if (gameOverScreenEl) gameOverScreenEl.style.display = "none";
  showStartScreen();
  resetGameState();
  safePlay('bgm1');
});

const restartBtn = document.getElementById("restartBtn");
if (restartBtn) restartBtn.addEventListener("click", () => {
  if (gameOverScreenEl) gameOverScreenEl.style.display = "none";
  startGame(mode);
});

const startNormal = document.getElementById("startNormal");
if (startNormal) startNormal.addEventListener("click", () => { goFullscreen(); startGame("NORMAL"); });
const startSpeedrun = document.getElementById("startSpeedrun");
if (startSpeedrun) startSpeedrun.addEventListener("click", () => { goFullscreen(); startGame("SPEEDRUN"); });
const startSurvival = document.getElementById("startSurvival");
if (startSurvival) startSurvival.addEventListener("click", () => { goFullscreen(); startGame("SURVIVAL"); });
const startWave = document.getElementById("startWave");
if (startWave) startWave.addEventListener("click", () => { goFullscreen(); startGame("WAVE"); });
const startPractice = document.getElementById("startPractice");
if (startPractice) startPractice.addEventListener("click", () => { goFullscreen(); startGame("PRACTICE"); });

/* ensure start screen visible and controls hidden at load */
window.addEventListener("load", () => {
  resizeCanvas();
  initMap();
  updateHUD();
  showStartScreen();
  requestAnimationFrame(gameLoop);
});

/* =========================
   Game loop (minimal)
   ========================= */
function gameLoop(now) {
  const dt = Math.min((now - lastTime)/1000, 0.016);
  lastTime = now;
  if (gameRunning && !isPaused) {
    // update functions (placeholders)
    // updatePlayer(dt); updateEnemies(dt); updateProjectiles(dt); checkHealPickup();
  }
  // drawing placeholders
  if (ctx) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // drawFloorAndSky(); draw objects...
  }
  requestAnimationFrame(gameLoop);
}

/* =========================
   Minimal spawn functions (kept)
   ========================= */
const ENEMY_TYPES = {
  NORMAL: { name:"ノーマル", health:50, speed:0.04, color:"#cc33aa", fireRate:2000, damage:5 },
  FAST: { name:"ファスト", health:70, speed:0.12, color:"#44ddff", fireRate:800, damage:6 },
  SHOOTER: { name:"シューター", health:100, speed:0.03, color:"#ffaa33", fireRate:800, damage:10 },
  HEAVY: { name:"ヘビー", health:200, speed:0.02, color:"#ff6666", fireRate:2000, damage:15 },
  BOSS: { name:"ボス", health:800, speed:0.04, color:"#ff8800", fireRate:300, damage:20 }
};
function spawnEnemy(typeKey) {
  const type = ENEMY_TYPES[typeKey];
  const x = (Math.random() * 2 - 1) * (mapSize - 5);
  const z = (Math.random() * 2 - 1) * (mapSize - 5);
  enemies.push({ x, z, y: 1.5, health: type.health, maxHealth: type.health, speed: type.speed, type: typeKey, color: type.color, lastShot: 0, walkPhase: Math.random() * Math.PI * 2, targetX: x, targetZ: z, targetTimer: 0, fireRateMod: type.fireRate, stateTimer: 0, state: "patrol" });
}
