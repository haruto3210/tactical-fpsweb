<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>TACTICAL OPS — MOBILE</title>
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">

  <!-- Tailwind / Icons -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    @supports (width: 100dvw) {
      html, body { width: 100dvw; }
    }

    body { margin: 0; padding: 0; background: #000; color: #0f0; overflow: hidden; }

    /* 横向き警告 */
    .orientation-warning {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: #0f0;
      z-index: 99999;
      font-family: monospace;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .orientation-warning.active { display: flex; }

    /* UI 全体 */
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      image-rendering: crisp-edges;
    }

    /* クロスヘア */
    .crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(0,255,100,0.85);
      box-shadow: 0 0 8px rgba(0,255,100,0.7);
    }
    .crosshair::before { width: 24px; height: 2px; }
    .crosshair::after  { width: 2px; height: 24px; }
    .crosshair .dot {
      width: 3px; height: 3px;
      background: #0f0;
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* HUD */
    .hud {
      position: fixed;
      top: clamp(8px, 2.5vw, 20px);
      left: clamp(8px, 2.5vw, 20px);
      background: rgba(0,20,0,0.4);
      padding: clamp(6px, 1.5vw, 10px);
      border: 1px solid rgba(0,255,100,0.3);
      border-radius: 2px;
      font-family: monospace;
      font-size: clamp(10px, 1.8vw, 14px);
      z-index: 25;
      backdrop-filter: blur(4px);
    }

    /* モバイル操作 UI */
    .mobile-controls {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: clamp(10px, 3vw, 20px);
      z-index: 20;
      pointer-events: none;
    }

    .control-pad {
      width: clamp(90px, 24vw, 140px);
      height: clamp(90px, 24vw, 140px);
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(0,255,100,0.3);
      border-radius: 8px;
      position: relative;
      pointer-events: auto;
    }

    .dpad-btn {
      position: absolute;
      width: clamp(28px, 7vw, 40px);
      height: clamp(28px, 7vw, 40px);
      background: rgba(0,255,100,0.3);
      border: 1px solid rgba(0,255,100,0.5);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px, 2.8vw, 13px);
      color: #0f0;
      user-select: none;
    }

    .dpad-btn.up    { top: 5px; left: 50%; transform: translateX(-50%); }
    .dpad-btn.down  { bottom: 5px; left: 50%; transform: translateX(-50%); }
    .dpad-btn.left  { left: 5px; top: 50%; transform: translateY(-50%); }
    .dpad-btn.right { right: 5px; top: 50%; transform: translateY(-50%); }

    .action-buttons {
      display: flex;
      gap: clamp(10px, 3vw, 20px);
      pointer-events: auto;
    }

    .action-btn {
      width: clamp(44px, 11vw, 60px);
      height: clamp(44px, 11vw, 60px);
      border-radius: 4px;
      font-size: clamp(10px, 2.8vw, 13px);
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      border: 2px solid;
    }

    .fire-btn   { background: #d00; border-color: #f33; color: #fff; }
    .reload-btn { background: #fa3; border-color: #fc0; color: #000; }
    .weapon-btn { background: #08f; border-color: #0af; color: #fff; }

    /* 視点操作エリア（右側 70%） */
    #lookPad {
      position: fixed;
      right: 0; top: 0;
      width: 70%;
      height: 100%;
      z-index: 15;
      background: transparent;
      pointer-events: auto;
    }
  </style>
</head>

<body>
<div id="game-container">

  <!-- 横向き警告 -->
  <div id="orientationWarning" class="orientation-warning active">
    <div style="font-size: 32px;">📱 横向きにしてください！</div>
    <div style="font-size: 16px; color: #aaa;">ゲームは横向きでのプレイが推奨されます</div>
    <button id="okBtn"
            style="margin-top:20px;padding:12px 20px;background:#0f0;color:#000;font-weight:bold;border-radius:6px;">
      OK
    </button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="crosshair"><div class="dot"></div></div>
  <div class="muzzle-flash"></div>
  <div class="damage-overlay"></div>
  <div id="lookPad"></div>
<script>
// =============================
//  横向き警告（完全修正版）
// =============================
function checkOrientation() {
  const warningDiv = document.getElementById("orientationWarning");

  const isLandscape =
    (screen.orientation && screen.orientation.angle % 180 !== 0) ||
    window.matchMedia("(orientation: landscape)").matches;

  if (isLandscape) {
    warningDiv.classList.remove("active");
  } else {
    warningDiv.classList.add("active");
  }
}

document.getElementById("okBtn").addEventListener("click", () => {
  document.getElementById("orientationWarning").classList.remove("active");
});

window.addEventListener("orientationchange", checkOrientation);
window.addEventListener("resize", checkOrientation);
checkOrientation();


// =============================
//  スマホ専用設定
// =============================
function isMobileDevice() {
  return true; // スマホ専用
}

let isTouchDevice = isMobileDevice();


// =============================
//  グローバル変数
// =============================
let gameRunning = false;
let mode = "NORMAL";
let isPaused = false;
let isPointerLocked = false;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const keys = { w:false, a:false, s:false, d:false };
const mapSize = 30;

const player = {
  x:0, y:1.5, z:0,
  yaw:0, pitch:0,
  speed:0.18,
  radius:0.4
};

let health = 100;
let kills = 0;
let walls = [];
let enemies = [];
let projectiles = [];
let tracerLines = [];
let healItems = [];
let lastTime = performance.now();
let healSpawnTimer = 0;
let speedrunStart = 0;
let survivalStart = 0;
let survivalTime = 0;
let waveNumber = 1;
let waveEnemyCount = 0;
let waveSpawnTimer = 0;
let practiceScore = 0;


// =============================
//  武器システム
// =============================
const weapons = [
  { name:"ライフル", damage:30, maxAmmo:30, reloadTime:1500, fireRate:120, tracer:true },
  { name:"ショットガン", damage:12, pellets:6, spread:0.06, maxAmmo:8, reloadTime:1800, fireRate:500, tracer:true },
  { name:"スナイパーライフル", damage:80, maxAmmo:5, reloadTime:2000, fireRate:800, tracer:true },
  { name:"小機関銃", damage:18, maxAmmo:40, reloadTime:1400, fireRate:70, tracer:true }
];

let currentWeaponIndex = 0;
let ammo = weapons[0].maxAmmo;
let lastShotTime = 0;
let isReloading = false;


// =============================
//  敵タイプ
// =============================
const ENEMY_TYPES = {
  NORMAL:  { name:"ノーマル",  health:50,  speed:0.04, color:"#cc33aa", fireRate:2000, damage:5 },
  FAST:    { name:"ファスト",  health:70,  speed:0.12, color:"#44ddff", fireRate:800,  damage:6 },
  SHOOTER: { name:"シューター",health:100, speed:0.03, color:"#ffaa33", fireRate:800,  damage:10 },
  HEAVY:   { name:"ヘビー",   health:200, speed:0.02, color:"#ff6666", fireRate:2000, damage:15 },
  BOSS:    { name:"ボス",     health:800, speed:0.04, color:"#ff8800", fireRate:300,  damage:20 }
};


// =============================
//  UI
// =============================
function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (!isPaused) openPauseMenu();
    else closePauseMenu();
  }
});

function openPauseMenu() {
  document.getElementById("pauseScreen").style.display = "flex";
  isPaused = true;
}

function closePauseMenu() {
  document.getElementById("pauseScreen").style.display = "none";
  isPaused = false;
}

document.getElementById("homeBtn").onclick = () => {
  window.location.href = "../index.html";
};

document.getElementById("pauseResumeBtn").addEventListener("click", closePauseMenu);

document.getElementById("pauseTitleBtn").addEventListener("click", () => {
  closePauseMenu();
  document.getElementById("gameOverScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
  gameRunning = false;
  resetGameState();
});

document.getElementById("backToTitleBtn").addEventListener("click", () => {
  document.getElementById("gameOverScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
  gameRunning = false;
  resetGameState();
});

document.getElementById("restartBtn").addEventListener("click", () => {
  document.getElementById("gameOverScreen").style.display = "none";
  startGame(mode);
});

document.getElementById("startNormal").addEventListener("click", () => startGame("NORMAL"));
document.getElementById("startSpeedrun").addEventListener("click", () => startGame("SPEEDRUN"));
document.getElementById("startSurvival").addEventListener("click", () => startGame("SURVIVAL"));
document.getElementById("startWave").addEventListener("click", () => startGame("WAVE"));
document.getElementById("startPractice").addEventListener("click", () => startGame("PRACTICE"));


// =============================
//  3D 投影
// =============================
function project3D(x, y, z) {
  const dx = x - player.x;
  const dy = y - player.y;
  const dz = z - player.z;

  const cy = Math.cos(player.yaw), sy = Math.sin(player.yaw);
  const cp = Math.cos(player.pitch), sp = Math.sin(player.pitch);

  const rx = dx * cy - dz * sy;
  const rz = dx * sy + dz * cy;
  const ry = dy * cp - rz * sp;
  const rz2 = dy * sp + rz * cp;

  if (rz2 <= 0.1) return null;

  const fov = canvas.height;
  return {
    x: canvas.width/2 + (rx / rz2) * fov,
    y: canvas.height/2 - (ry / rz2) * fov,
    z: rz2
  };
}

// =============================
//  描画処理（後半）
// =============================
ctx.clearRect(0,0,canvas.width,canvas.height);
drawFloorAndSky();

const drawables = [];

walls.forEach(w=>{
  const d = drawWall(w);
  if (d) drawables.push(d);
});

enemies.forEach(e=>{
  const d = drawEnemy(e);
  if (d) drawables.push(d);
});

healItems.forEach(item=>{
  if (!item.taken){
    const d = drawHealItem(item);
    if (d) drawables.push(d);
  }
});

drawables.sort((a,b)=>b.z - a.z);
drawables.forEach(d=>d.draw());

drawProjectiles();
drawMinimap();

requestAnimationFrame(gameLoop);


// =============================
//  イベント登録
// =============================

// Escape → ポーズ
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if (!isPaused && gameRunning) openPauseMenu();
    else if (isPaused) closePauseMenu();
  }
});

// PC マウス操作は完全無効化（スマホ専用）
document.addEventListener("mousemove", e => {
  if (!isTouchDevice) return;
});

// PointerLock 状態
document.addEventListener("pointerlockchange", () => {
  isPointerLocked = document.pointerLockElement === canvas;
});

// モバイルコントロール表示
document.getElementById("mobileControls").style.display = "flex";


// =============================
//  D-Pad（移動）
// =============================
const setupDpadButton = (id, keyStart, keyEnd) => {
  const el = document.getElementById(id);

  el.addEventListener("touchstart", e => {
    e.preventDefault();
    keyStart();
  }, { passive: false });

  el.addEventListener("touchend", e => {
    e.preventDefault();
    keyEnd();
  }, { passive: false });

  el.addEventListener("touchcancel", e => {
    e.preventDefault();
    keyEnd();
  }, { passive: false });

  el.addEventListener("mousedown", e => {
    e.preventDefault();
    keyStart();
  });

  el.addEventListener("mouseup", e => {
    e.preventDefault();
    keyEnd();
  });

  el.addEventListener("mouseleave", () => keyEnd());
};

setupDpadButton("btnUp",    () => keys.w = true, () => keys.w = false);
setupDpadButton("btnDown",  () => keys.s = true, () => keys.s = false);
setupDpadButton("btnLeft",  () => keys.a = true, () => keys.a = false);
setupDpadButton("btnRight", () => keys.d = true, () => keys.d = false);


// =============================
//  押しっぱなし連射（スマホFPS必須）
// =============================
let fireHeld = false;

const fireBtn = document.getElementById("fireBtn");

fireBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  fireHeld = true;
}, { passive: false });

fireBtn.addEventListener("touchend", e => {
  e.preventDefault();
  fireHeld = false;
}, { passive: false });

fireBtn.addEventListener("mousedown", e => {
  e.preventDefault();
  fireHeld = true;
});

fireBtn.addEventListener("mouseup", e => {
  e.preventDefault();
  fireHeld = false;
});

// 自動連射ループ
function autoFireLoop() {
  if (fireHeld && gameRunning && !isPaused) {
    shoot();
  }
  requestAnimationFrame(autoFireLoop);
}
autoFireLoop();


// =============================
//  装填ボタン
// =============================
const reloadBtn = document.getElementById("reloadBtn");

reloadBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  if (gameRunning && !isPaused) reload();
}, { passive: false });

reloadBtn.addEventListener("mousedown", e => {
  e.preventDefault();
  if (gameRunning && !isPaused) reload();
});


// =============================
//  武器切り替え
// =============================
const weaponBtn = document.getElementById("weaponBtn");

weaponBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  if (gameRunning) {
    currentWeaponIndex = (currentWeaponIndex + 1) % weapons.length;
    ammo = Math.min(ammo, weapons[currentWeaponIndex].maxAmmo);
    updateHUD();
  }
}, { passive: false });

weaponBtn.addEventListener("mousedown", e => {
  e.preventDefault();
  if (gameRunning) {
    currentWeaponIndex = (currentWeaponIndex + 1) % weapons.length;
    ammo = Math.min(ammo, weapons[currentWeaponIndex].maxAmmo);
    updateHUD();
  }
});


// =============================
//  視点スワイプ（左側タップ）
// =============================
let touchStartX = 0;
let touchStartY = 0;
let isViewTouching = false;
let touchMoved = false;
const TOUCH_MOVE_THRESHOLD = 15;
const TAP_SHOOT_THRESHOLD = 120;
let touchStartTime = 0;

// 感度自動調整
function getSensitivity() {
  return canvas.width / 2000;
}

canvas.addEventListener("touchstart", e => {
  if (!gameRunning || isPaused) return;

  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = performance.now();
  isViewTouching = true;
  touchMoved = false;
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  if (!isViewTouching || !gameRunning || isPaused || !e.touches.length) return;

  e.preventDefault();
  const currentX = e.touches[0].clientX;
  const currentY = e.touches[0].clientY;

  const deltaX = currentX - touchStartX;
  const deltaY = currentY - touchStartY;

  if (Math.abs(deltaX) > TOUCH_MOVE_THRESHOLD || Math.abs(deltaY) > TOUCH_MOVE_THRESHOLD) {
    touchMoved = true;
  }

  if (touchMoved) {
    const sens = getSensitivity();
    player.yaw   += deltaX * sens;
    player.pitch -= deltaY * sens;

    const limit = Math.PI / 2.5;
    if (player.pitch >  limit) player.pitch =  limit;
    if (player.pitch < -limit) player.pitch = -limit;

    touchStartX = currentX;
    touchStartY = currentY;
  }
}, { passive: false });

canvas.addEventListener("touchend", e => {
  const touchDuration = performance.now() - touchStartTime;

  if (isViewTouching && !touchMoved && gameRunning && !isPaused && touchDuration < TAP_SHOOT_THRESHOLD) {
    shoot();
  }

  isViewTouching = false;
  touchMoved = false;
}, { passive: false });


// =============================
//  視点スワイプ（右側 70% lookPad）
// =============================
let lookPadTouchStartX = 0;
let lookPadTouchStartY = 0;
let isLookPadTouching = false;

const lookPad = document.getElementById("lookPad");

lookPad.addEventListener("touchstart", e => {
  if (!gameRunning || isPaused) return;
  e.preventDefault();

  lookPadTouchStartX = e.touches[0].clientX;
  lookPadTouchStartY = e.touches[0].clientY;
  isLookPadTouching = true;
}, { passive: false });

lookPad.addEventListener("touchmove", e => {
  if (!isLookPadTouching || !gameRunning || isPaused || !e.touches.length) return;

  e.preventDefault();

  const currentX = e.touches[0].clientX;
  const currentY = e.touches[0].clientY;

  const deltaX = currentX - lookPadTouchStartX;
  const deltaY = currentY - lookPadTouchStartY;

  const sens = getSensitivity();
  player.yaw   += deltaX * sens;
  player.pitch -= deltaY * sens;

  const limit = Math.PI / 2.5;
  if (player.pitch >  limit) player.pitch =  limit;
  if (player.pitch < -limit) player.pitch = -limit;

  lookPadTouchStartX = currentX;
  lookPadTouchStartY = currentY;
}, { passive: false });

lookPad.addEventListener("touchend", e => {
  e.preventDefault();
  isLookPadTouching = false;
}, { passive: false });

lookPad.addEventListener("touchcancel", e => {
  e.preventDefault();
  isLookPadTouching = false;
}, { passive: false });


// =============================
//  初期化
// =============================
window.addEventListener("resize", resize);

window.addEventListener("load", () => {
  resize();
  initMap();
  updateHUD();
  requestAnimationFrame(gameLoop);
});
</script>

</body>
</html>
