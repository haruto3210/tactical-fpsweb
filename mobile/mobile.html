<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>TACTICAL FPS - Mobile</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#0f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-user-select:none;touch-action:none}
    #game-container{position:relative;width:100%;height:100%;overflow:hidden}
    canvas{display:block;width:100%;height:100%;background:#000}
    .crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:40}
    .crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(0,255,120,0.9);box-shadow:0 0 8px rgba(0,255,120,0.6)}
    .crosshair::before{width:22px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%)}
    .crosshair::after{width:2px;height:22px;top:50%;left:50%;transform:translate(-50%,-50%)}
    .hud{position:absolute;left:6px;bottom:6px;color:#00ff88;font-family:monospace;z-index:45;font-size:13px;line-height:1.4;background:rgba(0,0,0,0.45);padding:8px;border-radius:8px;border:1px solid rgba(0,255,120,0.12)}
    .muzzle-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;pointer-events:none;opacity:0;z-index:30}
    .muzzle-flash.active{animation:flash 0.12s linear}
    @keyframes flash{0%{opacity:1;transform:translate(-50%,-50%) scale(0.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}
    .damage-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:35;opacity:0;background:radial-gradient(ellipse at center, transparent 30%, rgba(255,40,40,0.45) 60%, rgba(200,0,0,0.25) 100%)}
    .damage-overlay.active{animation:damage 0.4s ease-out}
    @keyframes damage{0%{opacity:1}100%{opacity:0}}
    .start-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:linear-gradient(135deg,#071018 0%,#0b0b12 100%)}
    .btn{padding:12px 18px;border-radius:8px;border:2px solid #00ff88;background:linear-gradient(180deg,#00ff88,#00cc66);color:#001;font-weight:700;margin:8px;min-width:180px}
    .btn-red{background:linear-gradient(180deg,#ff6b6b,#cc3b3b);color:#fff;border:2px solid #ff6b6b}
    .modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:60;background:rgba(0,0,0,0.6)}
    .modal{background:#0b0b0b;border:2px solid #00ff88;padding:14px;border-radius:8px;color:#fff;min-width:280px}
    /* touch controls */
    #touchControls{position:fixed;left:0;bottom:0;width:100%;height:40%;pointer-events:none;z-index:55}
    #joyLeft{position:absolute;left:6%;bottom:8%;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:auto;touch-action:none}
    #fireBtn{position:absolute;right:6%;bottom:18%;width:84px;height:84px;border-radius:50%;background:rgba(255,80,80,0.12);pointer-events:auto;border:2px solid rgba(255,80,80,0.18);font-weight:bold}
    #reloadBtn{position:absolute;right:6%;bottom:6%;width:64px;height:64px;border-radius:8px;background:rgba(255,255,255,0.04);pointer-events:auto;border:1px solid rgba(255,255,255,0.06)}
    @media (max-width:600px){ #joyLeft{width:96px;height:96px;left:5%} #fireBtn{width:72px;height:72px;right:5%} }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="crosshair"><div class="dot"></div></div>
    <div class="muzzle-flash"></div>
    <div class="damage-overlay"></div>

    <div class="hud" id="hud">
      <div><strong>TACTICAL FPS</strong></div>
      <div>名前: <span id="playerNameLabel">PLAYER</span></div>
      <div>体力: <span id="health">100</span></div>
      <div>武器: <span id="weaponName">Rifle</span></div>
      <div>弾: <span id="ammo">30</span>/<span id="maxAmmo">30</span></div>
      <div>キル: <span id="kills">0</span></div>
    </div>

    <div class="start-screen" id="startScreen">
      <h1 style="color:#00ff88;margin:0 0 8px 0">TACTICAL FPS</h1>
      <div style="color:#cfe;font-family:monospace;margin-bottom:10px">
        名前: <input id="playerNameInput" type="text" maxlength="16" placeholder="PLAYER" style="background:#000;color:#0f0;border:1px solid #223;padding:6px;border-radius:6px">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button id="slotBtn1" class="btn">Slot 1: 空</button>
        <button id="slotBtn2" class="btn">Slot 2: 空</button>
        <button id="slotBtn3" class="btn">Slot 3: 空</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center">
        <button id="startNormal" class="btn">▶ ノーマル</button>
        <button id="startSpeedrun" class="btn">▶ スピードラン</button>
        <button id="startSurvival" class="btn">▶ サバイバル</button>
        <button id="startWave" class="btn" style="background:linear-gradient(180deg,#ffb86b,#ff8b3b);border-color:#ffb86b">⚡ ウェーブ</button>
        <button id="startPractice" class="btn" style="background:linear-gradient(180deg,#8fdfff,#4fb8ff);border-color:#8fdfff">▶ 練習</button>
      </div>
    </div>

    <div id="gameOverScreen" class="modal-backdrop"><div class="modal" style="text-align:center"><p id="finalText">ゲームオーバー</p><div style="margin-top:10px"><button id="restartBtn" class="btn btn-red">↻ もう一度</button><button id="backToTitleBtn" class="btn" style="margin-left:8px">タイトル</button></div></div></div>

    <div id="pauseScreen" class="modal-backdrop"><div class="modal" style="text-align:center"><h3>一時停止</h3><div style="margin-top:8px"><button id="pauseResumeBtn" class="btn">▶ 戻る</button><button id="pauseSaveBtn" class="btn" style="margin-left:8px">💾 セーブ</button><button id="pauseLoadBtn" class="btn" style="margin-left:8px">▶ ロード</button></div><div style="margin-top:8px"><label style="color:#cfe"><input id="autosaveToggle" type="checkbox"> 自動セーブ（ポーズ時）</label></div><div style="margin-top:8px"><button id="pauseTitleBtn" class="btn">タイトルへ</button></div></div></div>

    <div id="overwriteModal" class="modal-backdrop"><div class="modal"><h3>上書き確認</h3><div id="overwriteMessage" style="margin-top:8px"></div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px"><button id="overwriteCancel" class="btn">キャンセル</button><button id="overwriteConfirm" class="btn btn-red">上書き</button></div></div></div>

    <div id="slotNameModal" class="modal-backdrop"><div class="modal"><h3>スロット名編集</h3><input id="slotNameInput" style="width:100%;padding:8px;margin-top:8px;background:#000;color:#0f0;border:1px solid #223;border-radius:6px"><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px"><button id="slotNameCancel" class="btn">キャンセル</button><button id="slotNameSave" class="btn">保存</button></div></div></div>

    <div id="touchControls">
      <div id="joyLeft"></div>
      <button id="fireBtn">射撃</button>
      <button id="reloadBtn">R</button>
    </div>
  </div>

  <script>
  // Mobile-focused FPS with save/load (IndexedDB fallback to localStorage)
  (function(){
    // --- Rendering & performance ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function applyRenderScale(){
      const dpr = window.devicePixelRatio || 1;
      const scale = dpr > 1.5 ? 1 : dpr;
      canvas.width = Math.floor(canvas.clientWidth * scale);
      canvas.height = Math.floor(canvas.clientHeight * scale);
      ctx.setTransform(scale,0,0,scale,0,0);
    }
    window.addEventListener('resize', applyRenderScale);
    applyRenderScale();

    let lastTime = performance.now();
    let targetFPS = /Android|iPhone|iPad/.test(navigator.userAgent) ? 30 : 60;
    let frameInterval = 1000/targetFPS;
    let lastFrameTime = performance.now();

    // --- Game state (kept compact) ---
    const mapSize = 30;
    const player = { x:0,y:1.5,z:0,yaw:0,pitch:0,speed:0.18,radius:0.4 };
    let health=100,kills=0,mode="NORMAL",gameRunning=false,isPaused=false;
    let walls=[],enemies=[],projectiles=[],healItems=[];
    let currentWeaponIndex=0,ammo=30,isReloading=false,lastShotTime=0;
    let healSpawnTimer=0,waveNumber=1,waveSpawnTimer=0,speedrunStart=0,survivalStart=0;
    let playerName = localStorage.getItem('tacops_playerName') || 'PLAYER';
    document.getElementById('playerNameLabel').textContent = playerName;
    document.getElementById('playerNameInput').value = playerName;

    const weapons = [
      { name:"ライフル", damage:30, maxAmmo:30, reloadTime:1500, fireRate:120 },
      { name:"ショットガン", damage:12, pellets:6, spread:0.06, maxAmmo:8, reloadTime:1800, fireRate:500 },
      { name:"スナイパー", damage:80, maxAmmo:5, reloadTime:2000, fireRate:800 },
      { name:"SMG", damage:18, maxAmmo:40, reloadTime:1400, fireRate:70 }
    ];

    const ENEMY_TYPES = {
      NORMAL:{health:50,speed:0.04,color:'#cc33aa',fireRate:2000,damage:5},
      FAST:{health:70,speed:0.12,color:'#44ddff',fireRate:800,damage:6},
      SHOOTER:{health:100,speed:0.03,color:'#ffaa33',fireRate:900,damage:10},
      HEAVY:{health:200,speed:0.02,color:'#ff6666',fireRate:2000,damage:15},
      BOSS:{health:800,speed:0.04,color:'#ff8800',fireRate:500,damage:20}
    };

    // --- Storage: IndexedDB with localStorage fallback ---
    const Storage = (() => {
      const DB = 'tacops_db', STORE='saves';
      let dbp = null;
      function openDB(){
        if(dbp) return dbp;
        dbp = new Promise((res,rej)=>{
          try{
            const r = indexedDB.open(DB,1);
            r.onupgradeneeded = ()=> r.result.createObjectStore(STORE);
            r.onsuccess = ()=> res(r.result);
            r.onerror = ()=> rej(r.error);
          }catch(e){ rej(e); }
        });
        return dbp;
      }
      async function set(key,val){
        try{
          const db = await openDB();
          return new Promise((res,rej)=>{
            const tx = db.transaction(STORE,'readwrite');
            const s = tx.objectStore(STORE);
            const rq = s.put(val,key);
            rq.onsuccess = ()=> res(true);
            rq.onerror = ()=> rej(rq.error);
          });
        }catch(e){
          try{ localStorage.setItem(key,JSON.stringify(val)); return true; }catch{ return false; }
        }
      }
      async function get(key){
        try{
          const db = await openDB();
          return new Promise((res,rej)=>{
            const tx = db.transaction(STORE,'readonly');
            const s = tx.objectStore(STORE);
            const rq = s.get(key);
            rq.onsuccess = ()=> res(rq.result===undefined?null:rq.result);
            rq.onerror = ()=> rej(rq.error);
          });
        }catch(e){
          try{ const v = localStorage.getItem(key); return v?JSON.parse(v):null; }catch{return null;}
        }
      }
      async function del(key){
        try{
          const db = await openDB();
          return new Promise((res,rej)=>{
            const tx = db.transaction(STORE,'readwrite');
            const s = tx.objectStore(STORE);
            const rq = s.delete(key);
            rq.onsuccess = ()=> res(true);
            rq.onerror = ()=> rej(rq.error);
          });
        }catch(e){
          try{ localStorage.removeItem(key); return true; }catch{return false;}
        }
      }
      return { set,get,del };
    })();

    const SLOT_KEY_PREFIX = 'tacops_slot_';
    let currentSlotSelection = 0;
    let _pendingOverwriteSlot = null;
    let _pendingEditSlot = null;

    // --- Map / spawn / collision ---
    function initMap(){
      walls = [];
      for(let i=-mapSize;i<=mapSize;i+=2){
        walls.push({x1:-mapSize,z1:i,x2:-mapSize,z2:i+2,color:'#2a4a3a',height:4});
        walls.push({x1:mapSize,z1:i,x2:mapSize,z2:i+2,color:'#2a4a3a',height:4});
        walls.push({x1:i,z1:-mapSize,x2:i+2,z2:-mapSize,color:'#3a4a2a',height:4});
        walls.push({x1:i,z1:mapSize,x2:i+2,z2:mapSize,color:'#3a4a2a',height:4});
      }
      for(let i=0;i<8;i++){
        const x=(Math.random()*2-1)*(mapSize-8), z=(Math.random()*2-1)*(mapSize-8), w=3+Math.random()*6, h=3+Math.random()*4;
        walls.push({x1:x,z1:z,x2:x+w,z2:z,color:'#4a3a2a',height:h});
      }
    }

    function spawnEnemy(typeKey){
      const type = ENEMY_TYPES[typeKey] || ENEMY_TYPES.NORMAL;
      const x=(Math.random()*2-1)*(mapSize-5), z=(Math.random()*2-1)*(mapSize-5);
      enemies.push({ x,z,y:1.5,health:type.health,maxHealth:type.health,speed:type.speed,type:typeKey,color:type.color,lastShot:0,walkPhase:Math.random()*Math.PI*2,targetX:x,targetZ:z,targetTimer:0,fireRateMod:type.fireRate,stateTimer:0,state:'patrol' });
      if(enemies.length>60) enemies.splice(0,enemies.length-60);
    }

    function spawnHealItem(){
      const x=(Math.random()*2-1)*(mapSize-4), z=(Math.random()*2-1)*(mapSize-4);
      healItems.push({x,z,y:0.5,size:0.5,taken:false,rotation:0});
      if(healItems.length>20) healItems.splice(0,healItems.length-20);
    }

    function isColliding(x,z){
      if(Math.abs(x)>mapSize-1||Math.abs(z)>mapSize-1) return true;
      for(const w of walls){
        const minX=Math.min(w.x1,w.x2)-player.radius, maxX=Math.max(w.x1,w.x2)+player.radius;
        const minZ=Math.min(w.z1,w.z2)-player.radius, maxZ=Math.max(w.z1,w.z2)+player.radius;
        if(x>minX && x<maxX && z>minZ && z<maxZ) return true;
      }
      return false;
    }

    function isEnemyColliding(x,z){
      const r=0.75;
      if(Math.abs(x)>mapSize-1||Math.abs(z)>mapSize-1) return true;
      for(const w of walls){
        const minX=Math.min(w.x1,w.x2)-r, maxX=Math.max(w.x1,w.x2)+r;
        const minZ=Math.min(w.z1,w.z2)-r, maxZ=Math.max(w.z1,w.z2)+r;
        if(x>minX && x<maxX && z>minZ && z<maxZ) return true;
      }
      return false;
    }

    // --- Projection & drawing ---
    function project3D(x,y,z){
      const dx=x-player.x, dy=y-player.y, dz=z-player.z;
      const cy=Math.cos(player.yaw), sy=Math.sin(player.yaw);
      const cp=Math.cos(player.pitch), sp=Math.sin(player.pitch);
      const rx = dx*cy - dz*sy;
      const rz = dx*sy + dz*cy;
      const ry = dy*cp - rz*sp;
      const rz2 = dy*sp + rz*cp;
      if(rz2<=0.1) return null;
      const fov = canvas.height;
      return { x: canvas.width/2 + (rx/rz2)*fov, y: canvas.height/2 - (ry/rz2)*fov, z: rz2 };
    }

    function drawWall(w){ /* simplified wall draw */ 
      const h = w.height||3;
      const p0=project3D(w.x1,0,w.z1), p1=project3D(w.x2,0,w.z2), p2=project3D(w.x2,h,w.z2), p3=project3D(w.x1,h,w.z1);
      if(!p0||!p1||!p2||!p3) return null;
      const avgZ=(p0.z+p1.z+p2.z+p3.z)/4;
      return { z:avgZ, draw:()=>{ ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y); ctx.closePath(); ctx.fillStyle=w.color||'#444'; ctx.globalAlpha=Math.max(0.25,1-avgZ/60); ctx.fill(); ctx.globalAlpha=1; } };
    }

    function drawHealItem(item){
      const p=project3D(item.x,item.y,item.z); if(!p) return null;
      const size = Math.max(6, 40/p.z);
      return { z:p.z, draw:()=>{ ctx.save(); ctx.translate(p.x,p.y); ctx.fillStyle='rgba(80,255,140,0.9)'; ctx.beginPath(); ctx.arc(0,0,size*0.4,0,Math.PI*2); ctx.fill(); ctx.restore(); } };
    }

    function drawEnemy(e){
      const p=project3D(e.x,e.y,e.z); if(!p) return null;
      const size = Math.max(8, 220/p.z);
      return { z:p.z, draw:()=>{ ctx.save(); ctx.translate(p.x,p.y); ctx.fillStyle=e.color||'#c33'; ctx.fillRect(-size/2,-size,size,size*1.4); ctx.fillStyle='#000'; ctx.fillRect(-size*0.25,-size*1.05,size*0.2,size*0.2); ctx.fillRect(size*0.05,-size*1.05,size*0.2,size*0.2); ctx.restore(); } };
    }

    function drawProjectiles(){
      for(const p of projectiles){
        const pr = project3D(p.x,p.y,p.z); if(!pr) continue;
        const r = Math.max(2, 8/pr.z);
        ctx.beginPath();
        ctx.fillStyle = p.owner==='player' ? 'rgba(255,240,160,1)' : 'rgba(255,120,120,1)';
        ctx.arc(pr.x,pr.y,r,0,Math.PI*2); ctx.fill();
      }
    }

    function drawMinimap(){
      const size = 120;
      ctx.save();
      ctx.translate(canvas.width-size-10,10);
      ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,size,size);
      ctx.fillStyle='#0f0';
      ctx.beginPath(); ctx.arc((player.x+mapSize)/(mapSize*2)*size,(player.z+mapSize)/(mapSize*2)*size,4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // --- Player update (touch + keys) ---
    const keysState = { w:false,a:false,s:false,d:false };
    function updatePlayer(dt){
      let dx=0,dz=0;
      if(keysState.w) { dx += Math.sin(player.yaw); dz += Math.cos(player.yaw); }
      if(keysState.s) { dx -= Math.sin(player.yaw); dz -= Math.cos(player.yaw); }
      if(keysState.a) { dx -= Math.cos(player.yaw); dz += Math.sin(player.yaw); }
      if(keysState.d) { dx += Math.cos(player.yaw); dz -= Math.sin(player.yaw); }
      if(dx!==0||dz!==0){
        const len=Math.hypot(dx,dz)||1; dx=dx/len*player.speed*dt*60; dz=dz/len*player.speed*dt*60;
        const nx=player.x+dx, nz=player.z+dz;
        if(!isColliding(nx,player.z)) player.x=nx;
        if(!isColliding(player.x,nz)) player.z=nz;
      }
    }

    // --- Projectiles update ---
    function updateProjectiles(dt){
      const remove=[];
      for(let i=0;i<projectiles.length;i++){
        const p=projectiles[i];
        const nx=p.x+p.vx*dt*60, ny=p.y+p.vy*dt*60, nz=p.z+p.vz*dt*60;
        if(isColliding(nx,nz)) p.life=0; else { p.x=nx; p.y=ny; p.z=nz; }
        p.life -= dt;
        if(p.life>0){
          if(p.owner==='player'){
            for(let j=0;j<enemies.length;j++){
              const e=enemies[j];
              if(Math.hypot(p.x-e.x,p.z-e.z)<0.9){
                e.health -= p.damage; p.life=0;
                const snd = document.getElementById('sndHit'); if(snd) try{ snd.cloneNode().play(); }catch{}
                if(e.health<=0){ enemies.splice(j,1); j--; kills++; updateHUD(); }
                break;
              }
            }
          } else {
            if(Math.hypot(p.x-player.x,p.z-player.z)<1.0){
              health -= p.damage; p.life=0; updateHUD();
              const overlay = document.querySelector('.damage-overlay'); if(overlay){ overlay.classList.remove('active'); void overlay.offsetWidth; overlay.classList.add('active'); }
              const snd = document.getElementById('sndHurt'); if(snd) try{ snd.cloneNode().play(); }catch{}
              if(health<=0) endGame();
            }
          }
        }
        if(p.life<=0) remove.push(i);
      }
      for(let i=remove.length-1;i>=0;i--) projectiles.splice(remove[i],1);
    }

    // --- Enemies update ---
    function updateEnemies(dt){
      const now = performance.now();
      for(const enemy of enemies){
        const dx = player.x - enemy.x, dz = player.z - enemy.z;
        const dist = Math.hypot(dx,dz);
        const type = ENEMY_TYPES[enemy.type] || ENEMY_TYPES.NORMAL;
        enemy.stateTimer = (enemy.stateTimer||0) - dt;
        if(enemy.stateTimer<=0){
          if(dist<15){ enemy.state='chase'; enemy.stateTimer=2; }
          else { enemy.state='patrol'; enemy.stateTimer=3; }
        }
        if(enemy.state==='patrol'){
          enemy.targetTimer = (enemy.targetTimer||0) - dt;
          if(enemy.targetTimer<=0){ enemy.targetX=(Math.random()*2-1)*(mapSize-5); enemy.targetZ=(Math.random()*2-1)*(mapSize-5); enemy.targetTimer=4+Math.random()*4; }
          const tdx=enemy.targetX-enemy.x, tdz=enemy.targetZ-enemy.z, tdist=Math.hypot(tdx,tdz)||1;
          if(tdist>0.5){ const mx=(tdx/tdist)*enemy.speed*dt*60, mz=(tdz/tdist)*enemy.speed*dt*60; if(!isEnemyColliding(enemy.x+mx,enemy.z)) enemy.x+=mx; if(!isEnemyColliding(enemy.x,enemy.z+mz)) enemy.z+=mz; }
        } else if(enemy.state==='chase'){
          if(dist>0.5){ const mx=(dx/dist)*enemy.speed*dt*60, mz=(dz/dist)*enemy.speed*dt*60; if(!isEnemyColliding(enemy.x+mx,enemy.z)) enemy.x+=mx; if(!isEnemyColliding(enemy.x,enemy.z+mz)) enemy.z+=mz; }
        }
        enemy.walkPhase = (enemy.walkPhase||0) + enemy.speed*10*dt*60;
        if(dist<0.9){ health -= 10*dt; updateHUD(); const overlay=document.querySelector('.damage-overlay'); if(overlay){ overlay.classList.remove('active'); void overlay.offsetWidth; overlay.classList.add('active'); } if(health<=0) endGame(); }
        if(dist<30 && now - (enemy.lastShot||0) > (enemy.fireRateMod||type.fireRate)){
          enemy.lastShot = now;
          const dy = player.y - enemy.y;
          const dlen = Math.hypot(dx,dz,dy)||1;
          const vx = (dx/dlen)*1.2, vy=(dy/dlen)*1.2, vz=(dz/dlen)*1.2;
          projectiles.push({ x:enemy.x,y:enemy.y,z:enemy.z,vx,vy,vz,life:3,owner:'enemy',damage:type.damage });
          if(projectiles.length>120) projectiles.splice(0,projectiles.length-120);
          const snd = document.getElementById('sndShootEnemy'); if(snd) try{ snd.cloneNode().play(); }catch{}
        }
      }
    }

    // --- HUD / controls ---
    function updateHUD(){
      document.getElementById('health').textContent = Math.max(0,Math.floor(health));
      document.getElementById('weaponName').textContent = weapons[currentWeaponIndex].name;
      document.getElementById('ammo').textContent = ammo;
      document.getElementById('maxAmmo').textContent = weapons[currentWeaponIndex].maxAmmo;
      document.getElementById('kills').textContent = kills;
      document.getElementById('modeName').textContent = mode;
      document.getElementById('playerNameLabel').textContent = playerName;
    }

    function reload(){
      if(isReloading) return;
      const w = weapons[currentWeaponIndex];
      if(ammo===w.maxAmmo) return;
      isReloading=true; document.getElementById('ammo').textContent='...';
      setTimeout(()=>{ ammo=w.maxAmmo; isReloading=false; updateHUD(); }, w.reloadTime);
    }

    function playShootSound(){ const s=document.getElementById('sndShootPlayer'); if(s) try{ s.cloneNode().play(); }catch{} }
    function playEnemyShootSound(){ const s=document.getElementById('sndShootEnemy'); if(s) try{ s.cloneNode().play(); }catch{} }

    function shoot(){
      if(!gameRunning||isReloading) return;
      const now = performance.now();
      const w = weapons[currentWeaponIndex];
      if(now - lastShotTime < w.fireRate) return;
      if(ammo<=0){ reload(); return; }
      lastShotTime = now; ammo--; updateHUD();
      const flash = document.querySelector('.muzzle-flash'); if(flash){ flash.classList.remove('active'); void flash.offsetWidth; flash.classList.add('active'); }
      playShootSound();
      const yaw = player.yaw, pitch = player.pitch;
      const dirX = Math.sin(yaw)*Math.cos(pitch), dirY=Math.sin(pitch), dirZ=Math.cos(yaw)*Math.cos(pitch);
      if(currentWeaponIndex===1){
        const spec = weapons[1];
        for(let i=0;i<spec.pellets;i++){
          const sy = yaw + (Math.random()-0.5)*spec.spread;
          const sp = pitch + (Math.random()-0.5)*spec.spread;
          const vx = Math.sin(sy)*Math.cos(sp), vy=Math.sin(sp), vz=Math.cos(sy)*Math.cos(sp);
          projectiles.push({ x:player.x,y:player.y,z:player.z,vx:vx*1.2,vy:vy*1.2,vz:vz*1.2,life:2.5,owner:'player',damage:spec.damage });
        }
      } else {
        const speed = currentWeaponIndex===2?2.5:1.6;
        projectiles.push({ x:player.x,y:player.y,z:player.z,vx:dirX*speed,vy:dirY*speed,vz:dirZ*speed,life:3,owner:'player',damage:weapons[currentWeaponIndex].damage });
      }
      if(projectiles.length>120) projectiles.splice(0,projectiles.length-120);
      if(ammo<=0) reload();
    }

    // --- Save / Load (slot) using Storage wrapper ---
    async function saveToSlot(slot, force=false, slotName=null){
      const key = SLOT_KEY_PREFIX + slot;
      const existing = await Storage.get(key);
      if(existing && !force){
        showOverwriteModal(slot);
        return false;
      }
      const data = {
        player:{x:player.x,y:player.y,z:player.z,yaw:player.yaw,pitch:player.pitch,health,weaponIndex:currentWeaponIndex,ammo},
        playerName, mode, enemies:enemies.map(e=>({x:e.x,y:e.y,z:e.z,health:e.health,maxHealth:e.maxHealth,type:e.type,color:e.color,lastShot:e.lastShot,walkPhase:e.walkPhase,targetX:e.targetX,targetZ:e.targetZ,state:e.state})),
        healItems:healItems.map(h=>({x:h.x,y:h.y,z:h.z,taken:h.taken,size:h.size,rotation:h.rotation})),
        walls, waveNumber, savedAt:Date.now(), slotName: slotName ?? (existing?existing.slotName:null)
      };
      try{
        await Storage.set(key,data);
        updateSlotButtons();
        return true;
      }catch(e){ console.error('save slot failed',e); return false; }
    }

    async function loadFromSlot(slot){
      const key = SLOT_KEY_PREFIX + slot;
      const data = await Storage.get(key);
      if(!data){ alert('セーブがありません'); return false; }
      loadGameFromData(data);
      return true;
    }

    function updateSlotButtons(){
      for(let i=1;i<=3;i++){
        const btn = document.getElementById('slotBtn'+i);
        if(!btn) continue;
        Storage.get(SLOT_KEY_PREFIX+i).then(json=>{
          if(!json){ btn.textContent = `Slot ${i}: 空`; btn.title='長押しでセーブ / タップで選択 / ダブルタップでロード'; }
          else {
            const date = json.savedAt?new Date(json.savedAt):null;
            const label = json.slotName?json.slotName:(date?date.toLocaleString():'保存済');
            btn.textContent = `Slot ${i}: ${label}`;
            btn.title='長押しでセーブ / タップで選択 / ダブルタップでロード / 長押し+Altで名前編集';
          }
          if(currentSlotSelection===i) btn.style.outline='3px solid rgba(0,255,120,0.6)'; else btn.style.outline='none';
        });
      }
    }

    function showOverwriteModal(slot){
      _pendingOverwriteSlot = slot;
      const modal = document.getElementById('overwriteModal'); const msg = document.getElementById('overwriteMessage');
      Storage.get(SLOT_KEY_PREFIX+slot).then(json=>{
        let label = `Slot ${slot} を上書きしますか？`;
        if(json){ const date = json.savedAt?new Date(json.savedAt):null; label = `Slot ${slot} を上書きしますか？ ${json.slotName? '['+json.slotName+'] ':''}${date?date.toLocaleString():''}`; }
        if(msg) msg.textContent = label;
        if(modal) modal.style.display='flex';
      });
    }
    function hideOverwriteModal(){ document.getElementById('overwriteModal').style.display='none'; _pendingOverwriteSlot=null; }

    function showSlotNameModal(slot){
      _pendingEditSlot = slot;
      const modal = document.getElementById('slotNameModal'); const input = document.getElementById('slotNameInput');
      Storage.get(SLOT_KEY_PREFIX+slot).then(json=>{ input.value = json? (json.slotName||'') : ''; modal.style.display='flex'; });
    }
    function hideSlotNameModal(){ document.getElementById('slotNameModal').style.display='none'; _pendingEditSlot=null; }

    function applyPlayerName(){ const v = (document.getElementById('playerNameInput').value||'').trim()||'PLAYER'; playerName=v; localStorage.setItem('tacops_playerName',playerName); document.getElementById('playerNameLabel').textContent=playerName; }

    function saveQuick(){
      const data = { player:{x:player.x,y:player.y,z:player.z,yaw:player.yaw,pitch:player.pitch,health,weaponIndex:currentWeaponIndex,ammo}, playerName, mode, enemies, healItems, walls, waveNumber, savedAt:Date.now() };
      try{ localStorage.setItem('tacops_save',JSON.stringify(data)); alert('クイックセーブしました'); }catch(e){ alert('セーブ失敗'); }
    }

    function loadQuick(){
      const json = localStorage.getItem('tacops_save'); if(!json){ alert('クイックセーブがありません'); return; }
      try{ const data = JSON.parse(json); loadGameFromData(data); }catch(e){ alert('ロード失敗'); }
    }

    function loadGameFromData(data){
      if(!data || !data.player) { alert('不正なデータ'); return; }
      player.x = data.player.x ?? player.x; player.y = data.player.y ?? player.y; player.z = data.player.z ?? player.z;
      player.yaw = data.player.yaw ?? player.yaw; player.pitch = data.player.pitch ?? player.pitch;
      health = data.player.health ?? health; currentWeaponIndex = data.player.weaponIndex ?? currentWeaponIndex; ammo = data.player.ammo ?? ammo;
      playerName = data.playerName || playerName; document.getElementById('playerNameLabel').textContent = playerName;
      mode = data.mode || mode;
      enemies = (data.enemies||[]).map(e=>({ x:e.x,y:e.y||1.5,z:e.z,health:e.health||50,maxHealth:e.maxHealth||50,speed:(ENEMY_TYPES[e.type]?.speed||0.04),type:e.type||'NORMAL',color:e.color||(ENEMY_TYPES[e.type]?.color||'#cc33aa'),lastShot:e.lastShot||0,walkPhase:e.walkPhase||Math.random()*Math.PI*2,targetX:e.targetX||e.x,targetZ:e.targetZ||e.z,targetTimer:e.targetTimer||0,fireRateMod:e.fireRateMod||(ENEMY_TYPES[e.type]?.fireRate||1000),stateTimer:e.stateTimer||0,state:e.state||'patrol' }));
      healItems = (data.healItems||[]).map(h=>({ x:h.x,y:h.y||0.5,z:h.z,size:h.size||0.5,taken:h.taken||false,rotation:h.rotation||0 }));
      walls = data.walls || walls;
      waveNumber = data.waveNumber || waveNumber;
      updateHUD();
      document.getElementById('startScreen').style.display='none';
      document.getElementById('gameOverScreen').style.display='none';
      document.getElementById('pauseScreen').style.display='none';
      gameRunning = true;
    }

    // --- Game loop ---
    function gameLoop(now){
      requestAnimationFrame(gameLoop);
      const elapsed = now - lastFrameTime;
      if(elapsed < frameInterval) return;
      lastFrameTime = now - (elapsed % frameInterval);
      const dt = Math.min((now - lastTime)/1000, 0.05);
      lastTime = now;

      // update
      if(gameRunning && !isPaused){
        updatePlayer(dt);
        updateEnemies(dt);
        updateProjectiles(dt);
        checkHealPickup();
        healSpawnTimer += dt;
        if(healSpawnTimer > 15){ healSpawnTimer = 0; spawnHealItem(); }

        // mode-specific
        if(mode==='WAVE'){
          waveSpawnTimer += dt;
          if(enemies.length===0 && waveSpawnTimer>2){
            waveNumber++; waveEnemyCount = 3 + waveNumber*2; waveSpawnTimer=0;
            for(let i=0;i<waveEnemyCount;i++) spawnEnemy(Math.random()<0.4?'FAST':Math.random()<0.5?'HEAVY':'SHOOTER');
            if(waveNumber%5===0) spawnEnemy('BOSS');
          }
        } else if(mode==='SPEEDRUN'){
          if(enemies.length===0 && kills>=10) endGame();
        } else if(mode==='NORMAL'){
          if(enemies.length===0) endGame();
        } else if(mode==='PRACTICE'){
          if(enemies.length<2) spawnEnemy('NORMAL');
        }
      }

      // render
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawFloorAndSky();
      const drawables=[];
      for(const w of walls){ const d=drawWall(w); if(d) drawables.push(d); }
      for(const e of enemies){ const d=drawEnemy(e); if(d) drawables.push(d); }
      for(const h of healItems){ if(!h.taken){ const d=drawHealItem(h); if(d) drawables.push(d); } }
      drawables.sort((a,b)=>b.z-a.z); for(const d of drawables) d.draw();
      drawProjectiles();
      drawMinimap();
      updateHUD();
    }

    function drawFloorAndSky(){
      const skyGrad = ctx.createLinearGradient(0,0,0,canvas.height/2);
      skyGrad.addColorStop(0,'#071018'); skyGrad.addColorStop(1,'#0b0b12');
      ctx.fillStyle = skyGrad; ctx.fillRect(0,0,canvas.width,canvas.height/2);
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);
    }

    function checkHealPickup(){
      for(const item of healItems){
        if(item.taken) continue;
        if(Math.hypot(player.x-item.x,player.z-item.z) < 1.0){ item.taken=true; health = Math.min(100, health+30); updateHUD(); const s=document.getElementById('sndHeal'); if(s) try{s.cloneNode().play();}catch{} }
      }
    }

    function endGame(){
      gameRunning=false;
      document.getElementById('gameOverScreen').style.display='flex';
      document.getElementById('finalText').textContent = `ゲームオーバー — 殺した: ${kills} 人`;
    }

    // --- Input: keyboard & pointer & touch ---
    window.addEventListener('keydown', e=>{
      if(e.key==='Escape'){ togglePause(); return; }
      const k = e.key.toLowerCase();
      if(k==='w'||k==='a'||k==='s'||k==='d') keysState[k]=true;
      if(k==='r') reload();
      if(k==='1') { currentWeaponIndex=0; ammo=Math.min(ammo,weapons[0].maxAmmo); updateHUD(); }
      if(k==='2') { currentWeaponIndex=1; ammo=Math.min(ammo,weapons[1].maxAmmo); updateHUD(); }
      if(k==='3') { currentWeaponIndex=2; ammo=Math.min(ammo,weapons[2].maxAmmo); updateHUD(); }
      if(k==='4') { currentWeaponIndex=3; ammo=Math.min(ammo,weapons[3].maxAmmo); updateHUD(); }
    });
    window.addEventListener('keyup', e=>{ const k=e.key.toLowerCase(); if(k in keysState) keysState[k]=false; });

    canvas.addEventListener('click', ()=>{ if(!isPointerLocked) canvas.requestPointerLock?.(); if(gameRunning && !isPaused) shoot(); });

    document.addEventListener('pointerlockchange', ()=>{ isPointerLocked = document.pointerLockElement === canvas; });
    document.addEventListener('mousemove', e=>{ if(!gameRunning||!isPointerLocked||isPaused) return; player.yaw += (e.movementX||0)*0.003; player.pitch -= (e.movementY||0)*0.003; const limit=Math.PI/2.5; if(player.pitch>limit) player.pitch=limit; if(player.pitch<-limit) player.pitch=-limit; });

    // Touch: simple virtual joystick
    (function setupTouch(){
      const joy = document.getElementById('joyLeft');
      let active=false, center=null;
      joy.addEventListener('touchstart', e=>{ e.preventDefault(); active=true; const r=joy.getBoundingClientRect(); center={x:r.left+r.width/2,y:r.top+r.height/2}; });
      joy.addEventListener('touchmove', e=>{ e.preventDefault(); if(!active) return; const t=e.touches[0]; const dx=(t.clientX-center.x)/(joy.clientWidth/2); const dy=(t.clientY-center.y)/(joy.clientHeight/2); keysState.w = dy < -0.35; keysState.s = dy > 0.35; keysState.a = dx < -0.35; keysState.d = dx > 0.35; });
      joy.addEventListener('touchend', e=>{ e.preventDefault(); active=false; keysState.w=keysState.a=keysState.s=keysState.d=false; });
      document.getElementById('fireBtn').addEventListener('touchstart', e=>{ e.preventDefault(); shoot(); });
      document.getElementById('reloadBtn').addEventListener('touchstart', e=>{ e.preventDefault(); reload(); });
    })();

    // --- UI wiring ---
    document.getElementById('startNormal').addEventListener('click', ()=>{ startGame('NORMAL'); });
    document.getElementById('startSpeedrun').addEventListener('click', ()=>{ startGame('SPEEDRUN'); });
    document.getElementById('startSurvival').addEventListener('click', ()=>{ startGame('SURVIVAL'); });
    document.getElementById('startWave').addEventListener('click', ()=>{ startGame('WAVE'); });
    document.getElementById('startPractice').addEventListener('click', ()=>{ startGame('PRACTICE'); });

    document.getElementById('playerNameInput').addEventListener('change', ()=>{ applyPlayerName(); });

    // slot buttons: tap to select, double-tap to load, long-press to save
    for(let i=1;i<=3;i++){
      const btn = document.getElementById('slotBtn'+i);
      let pressTimer=null, lastTap=0;
      btn.addEventListener('touchstart', e=>{ e.preventDefault(); pressTimer = setTimeout(()=>{ saveToSlot(i,true).then(()=>{ updateSlotButtons(); alert('Slot '+i+' にセーブしました'); }); }, 600); });
      btn.addEventListener('touchend', e=>{ e.preventDefault(); if(pressTimer) clearTimeout(pressTimer); const now=Date.now(); if(now-lastTap<350){ loadFromSlot(i); } else { currentSlotSelection=i; updateSlotButtons(); } lastTap=now; });
      btn.addEventListener('click', e=>{ if(e.altKey){ showSlotNameModal(i); } else { currentSlotSelection=i; updateSlotButtons(); } });
      btn.addEventListener('dblclick', ()=> loadFromSlot(i));
      btn.addEventListener('contextmenu', e=>{ e.preventDefault(); saveToSlot(i,true).then(()=>{ updateSlotButtons(); alert('Slot '+i+' にセーブしました'); }); });
    }

    document.getElementById('overwriteConfirm').addEventListener('click', ()=>{ if(_pendingOverwriteSlot){ saveToSlot(_pendingOverwriteSlot,true).then(()=>{ updateSlotButtons(); alert('上書き保存しました'); }); } hideOverwriteModal(); });
    document.getElementById('overwriteCancel').addEventListener('click', hideOverwriteModal);

    document.getElementById('slotNameSave').addEventListener('click', async ()=>{
      const input = document.getElementById('slotNameInput'); if(!_pendingEditSlot) return hideSlotNameModal();
      const name = input.value.trim();
      const key = SLOT_KEY_PREFIX + _pendingEditSlot;
      const existing = await Storage.get(key);
      if(!existing){ await saveToSlot(_pendingEditSlot,true,name); } else { existing.slotName = name; await Storage.set(key,existing); }
      updateSlotButtons(); hideSlotNameModal();
    });
    document.getElementById('slotNameCancel').addEventListener('click', hideSlotNameModal);

    document.getElementById('pauseSaveBtn').addEventListener('click', ()=>{ if(currentSlotSelection>=1&&currentSlotSelection<=3) saveToSlot(currentSlotSelection,true).then(()=>{ updateSlotButtons(); alert('選択スロットにセーブしました'); }); else saveQuick(); });
    document.getElementById('pauseLoadBtn').addEventListener('click', ()=>{ if(currentSlotSelection>=1&&currentSlotSelection<=3) loadFromSlot(currentSlotSelection); else loadQuick(); });
    document.getElementById('pauseResumeBtn').addEventListener('click', ()=>{ togglePause(); });
    document.getElementById('pauseTitleBtn').addEventListener('click', ()=>{ document.getElementById('pauseScreen').style.display='none'; document.getElementById('startScreen').style.display='flex'; gameRunning=false; resetGameState(); });

    document.getElementById('restartBtn').addEventListener('click', ()=>{ startGame(mode); });
    document.getElementById('backToTitleBtn').addEventListener('click', ()=>{ document.getElementById('gameOverScreen').style.display='none'; document.getElementById('startScreen').style.display='flex'; gameRunning=false; resetGameState(); });

    document.getElementById('autosaveToggle').checked = localStorage.getItem('tacops_autosave')==='1';
    document.getElementById('autosaveToggle').addEventListener('change', e=> localStorage.setItem('tacops_autosave', e.target.checked ? '1' : '0'));

    // --- Game control helpers ---
    function startGame(selectedMode){
      mode = selectedMode || 'NORMAL';
      health=100; kills=0; currentWeaponIndex=0; ammo=weapons[0].maxAmmo; isReloading=false; lastShotTime=0;
      projectiles=[]; enemies=[]; healItems=[]; healSpawnTimer=0; waveNumber=1; waveSpawnTimer=0;
      player.x=0; player.z=0; player.yaw=0; player.pitch=0;
      initMap(); updateSlotButtons(); updateHUD();
      document.getElementById('startScreen').style.display='none';
      document.getElementById('gameOverScreen').style.display='none';
      gameRunning=true;
      // initial spawn
      if(mode==='NORMAL'){ for(let i=0;i<6;i++) spawnEnemy('NORMAL'); }
      else if(mode==='SPEEDRUN'){ speedrunStart=performance.now(); for(let i=0;i<8;i++) spawnEnemy('FAST'); }
      else if(mode==='SURVIVAL'){ survivalStart=performance.now(); for(let i=0;i<4;i++) spawnEnemy('NORMAL'); }
      else if(mode==='WAVE'){ waveNumber=1; for(let i=0;i<3;i++) spawnEnemy('NORMAL'); }
      else if(mode==='PRACTICE'){ for(let i=0;i<3;i++) spawnEnemy('NORMAL'); }
      requestAnimationFrame(gameLoop);
    }

    function resetGameState(){ player.x=0;player.z=0;player.yaw=0;player.pitch=0; enemies=[]; projectiles=[]; healItems=[]; health=100; kills=0; updateHUD(); }

    function togglePause(){
      isPaused = !isPaused;
      document.getElementById('pauseScreen').style.display = isPaused ? 'flex' : 'none';
      if(isPaused){
        const autosave = localStorage.getItem('tacops_autosave')==='1';
        if(autosave && currentSlotSelection>=1 && currentSlotSelection<=3) saveToSlot(currentSlotSelection,true).then(()=>updateSlotButtons());
      } else { requestAnimationFrame(gameLoop); }
    }

    // --- Initialization ---
    updateSlotButtons();
    updateHUD();
    requestAnimationFrame(gameLoop);

    // Expose some helpers for debugging
    window.tacops = { startGame, saveToSlot, loadFromSlot, saveQuick, loadQuick, updateSlotButtons };

  })();
  </script>
</body>
</html>
